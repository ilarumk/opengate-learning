<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🏗️ Construction World!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2E7D32;overflow:hidden;font-family:'Arial Black',Arial,sans-serif}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
#top-bar{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;gap:8px}
#vehicle-box{background:rgba(0,0,0,0.78);border:2px solid #FFD700;border-radius:10px;padding:7px 14px;color:#FFD700;min-width:170px}
#vname{font-size:17px;font-weight:bold}
#vspeed{font-size:11px;color:#aef;margin-top:2px}
#hp-wrap{margin-top:4px;background:#333;border-radius:4px;height:8px}
#hp-bar{height:8px;background:#4CAF50;border-radius:4px;transition:width .2s}
#inv-box{background:rgba(0,0,0,0.78);border:2px solid #FFD700;border-radius:10px;padding:7px 12px;color:#fff;font-size:13px;min-width:200px}
#inv-title{color:#FFD700;font-weight:bold;font-size:14px;margin-bottom:3px}
#score-box{background:rgba(0,0,0,0.78);border:2px solid #4CAF50;border-radius:10px;padding:7px 12px;color:#fff;font-size:13px;text-align:right}
#msg{position:fixed;top:48%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.88);color:#FFD700;font-size:20px;font-weight:bold;padding:12px 26px;border-radius:12px;border:2px solid #FFD700;pointer-events:none;z-index:20;text-align:center;display:none;max-width:420px}
#hint{position:fixed;bottom:8px;left:8px;background:rgba(0,0,0,0.75);color:#FFD700;font-size:11px;font-weight:bold;padding:5px 12px;border-radius:9px;border:1px solid #FFD700;pointer-events:none;z-index:10;text-align:left;max-width:420px}
#btn-panel{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);display:flex;flex-direction:row;gap:10px;z-index:100;}
.game-btn{background:rgba(0,0,0,0.92);border:3px solid #FFD700;border-radius:14px;color:#FFD700;font-size:22px;font-weight:900;padding:12px 20px;cursor:pointer;pointer-events:all;text-align:center;min-width:140px;box-shadow:0 0 16px rgba(255,215,0,0.5);transition:transform 0.1s,background 0.1s;user-select:none;}
.game-btn:hover{background:rgba(255,215,0,0.25);transform:scale(1.08);}
.game-btn:active{transform:scale(0.95);}
#time-btn{border-color:#87CEEB;box-shadow:0 0 18px rgba(135,206,235,0.6);color:#87CEEB;}
#fire-btn{border-color:#FF5722;box-shadow:0 0 18px rgba(255,87,34,0.6);color:#FF7043;}
#firework-btn{border-color:#E91E63;box-shadow:0 0 18px rgba(233,30,99,0.6);color:#F48FB1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="top-bar">
    <div id="vehicle-box">
      <div id="vname">🚛 Monster Truck</div>
      <div id="hp-wrap"><div id="hp-bar" style="width:100%"></div></div>
      <div id="vspeed">Speed: 0 🛞</div>
    </div>
    <div id="inv-box">
      <div id="inv-title">🎒 Inventory</div>
      <div id="inv-items">Empty — drive over items!</div>
    </div>
    <div id="score-box" id="score-box">
      🏠 Built: 0<br>⭐ Score: 0
    </div>
  </div>
</div>
<div id="msg"></div>
<div id="hint">1=🚛Monster1 &nbsp;9=🟢Monster2 &nbsp;2=⚡Tesla 3=🚗 4=🏗️Crane 5=🚂Train 6=🚜 7=🔧Fix 8=🚒Fire &nbsp;|&nbsp; WASD=Drive &nbsp;| 🐾 Visit PAW PATROL HQ! &nbsp;| 🌾 Visit Happy Farm! &nbsp;| 🤖 Ram Iron Golems!</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

// ── World ──────────────────────────────────────────────────────────────────
const W={w:3600,h:2800};
const cam={x:0,y:0};
function w2s(x,y){return[x-cam.x,y-cam.y];}

// ── Game state ─────────────────────────────────────────────────────────────
let score=0, built=0;
let msgTimer=0;
function showMsg(t){const e=document.getElementById('msg');e.innerHTML=t;e.style.display='block';msgTimer=220;}
function updateMsg(){if(msgTimer>0){msgTimer--;if(!msgTimer)document.getElementById('msg').style.display='none';}}

// ── Inventory ──────────────────────────────────────────────────────────────
const inv={wood:0,brick:0,steel:0,battery:0,glass:0};
function addInv(type,amt){inv[type]=(inv[type]||0)+amt;updateInvUI();}
function updateInvUI(){
  const parts=[];
  if(inv.wood)parts.push('🪵×'+inv.wood);
  if(inv.brick)parts.push('🧱×'+inv.brick);
  if(inv.steel)parts.push('⚙️×'+inv.steel);
  if(inv.glass)parts.push('🪟×'+inv.glass);
  if(inv.battery)parts.push('🔋×'+inv.battery);
  if(inv.fiber)parts.push('🧵×'+inv.fiber);
  document.getElementById('inv-items').textContent=parts.length?parts.join('  '):'Empty — drive over items!';
}
function updateScoreUI(){document.getElementById('score-box').innerHTML='🏠 Built: '+built+'<br>⭐ Score: '+score;}

// ── Roads & terrain ────────────────────────────────────────────────────────
// Main roads: horizontal and vertical
const H_ROADS=[
  {y:400,w:W.w},{y:900,w:W.w},{y:1500,w:W.w},{y:2100,w:W.w},{y:2600,w:W.w}
];
const V_ROADS=[
  {x:400,h:W.h},{x:1000,h:W.h},{x:1700,h:W.h},{x:2400,h:W.h},{x:3100,h:W.h}
];
const ROAD_W=90;

function onRoad(px,py){
  for(const r of H_ROADS) if(Math.abs(py-r.y)<ROAD_W/2) return true;
  for(const r of V_ROADS) if(Math.abs(px-r.x)<ROAD_W/2) return true;
  return false;
}

// ── Train track (oval loop) ────────────────────────────────────────────────
const TRACK_CX=1700, TRACK_CY=1500, TRACK_RX=680, TRACK_RY=420;
const TRACK_PTS=120;
function getTrackPos(t){
  const a=t*Math.PI*2;
  return{x:TRACK_CX+Math.cos(a)*TRACK_RX, y:TRACK_CY+Math.sin(a)*TRACK_RY,
    angle:Math.atan2(-Math.sin(a)*TRACK_RY, Math.cos(a)*TRACK_RX)+Math.PI/2};
}

// ── Build zones ────────────────────────────────────────────────────────────
const BUILD_ZONES=[
  {id:'house',   label:'🏠 House',   x:600, y:650,  w:200,h:160, need:{wood:5,brick:5,glass:2}, progress:0, done:false, col:'#795548'},
  {id:'garage',  label:'🏗️ Garage',  x:1200,y:650,  w:220,h:150, need:{steel:5,wood:3},         progress:0, done:false, col:'#546E7A'},
  {id:'workshop',label:'🔧 Workshop',x:2100,y:650,  w:200,h:160, need:{steel:6,brick:4},         progress:0, done:false, col:'#FF6F00'},
  {id:'charger', label:'⚡ Charger', x:2800,y:650,  w:160,h:120, need:{steel:3,battery:3},       progress:0, done:false, col:'#00BCD4'},
  {id:'house2',  label:'🏡 Big House',x:600,y:2350, w:240,h:180, need:{wood:7,brick:7,glass:4},  progress:0, done:false, col:'#8BC34A'},
  {id:'school',  label:'🏫 School',  x:1200,y:2350, w:260,h:170, need:{brick:8,glass:5,steel:3}, progress:0, done:false, col:'#CE93D8'},
  {id:'station',   label:'🚉 Station',    x:2100,y:2350, w:220,h:160, need:{steel:6,glass:4,wood:4},         progress:0, done:false, col:'#90A4AE'},
  {id:'rocketpad', label:'🚀 Rocket Pad', x:420, y:1535, w:160,h:120, need:{brick:8,steel:5,glass:3},        progress:0, done:false, col:'#455A64'},
];

function totalNeeded(bz){return Object.values(bz.need).reduce((a,b)=>a+b,0);}
function totalHave(bz){let s=0;for(const[k,v]of Object.entries(bz.need))s+=Math.min(inv[k]||0,v);return s;}

function tryBuild(bz){
  if(bz.done)return false;
  let canBuild=true;
  for(const[k,v]of Object.entries(bz.need)){if((inv[k]||0)<v){canBuild=false;break;}}
  if(!canBuild){
    const needs=Object.entries(bz.need).map(([k,v])=>({wood:'🪵',brick:'🧱',steel:'⚙️',glass:'🪟',battery:'🔋'}[k]+'×'+v)).join(' ');
    showMsg('Need: '+needs+' to build '+bz.label);return false;
  }
  for(const[k,v]of Object.entries(bz.need)) inv[k]-=v;
  bz.done=true;built++;score+=100;
  updateInvUI();updateScoreUI();
  if(bz.id==='rocketpad'){
    ROCKET.built=true;
    showMsg('🚀 ROCKET PAD BUILT! The rocket appears! Now fix it, fuel it, charge it and LAUNCH! +100 pts!');
  } else {
    showMsg('🎉 '+bz.label+' BUILT! +100 pts!');
  }
  spawnParty(bz.x+bz.w/2,bz.y+bz.h/2);
  return true;
}

// ── Paint system ───────────────────────────────────────────────────────────
const RAINBOW=['#F44336','#FF9800','#FFEB3B','#4CAF50','#2196F3','#9C27B0','#E91E63','#00BCD4','#FFFFFF','#212121'];
const RAINBOW_NAMES=['🔴 Red','🟠 Orange','🟡 Yellow','🟢 Green','🔵 Blue','🟣 Purple','💗 Pink','🩵 Cyan','⬜ White','⬛ Black'];
const PAINT_SHOP={x:2700,y:2300,w:220,h:190};
let selectedPaint=0;       // colour index
let paintType='normal';    // 'normal' or 'spray'
let paintMode=false;       // ready to paint
let sprayParticles=[];     // floating spray dots
let sprayProgress=0;       // 0-1 for spray painting progress

// ── Fuel/Petrol system ─────────────────────────────────────────────────────
const GAS_STATION={x:3000,y:1200,w:180,h:130};
// Gas vehicles: monster(0), car(2), crane(3), excavator(5), fixtruck(6)
const GAS_VEHICLES=[0,2,3,5,6,8];
// Fuel levels per vehicle index (null = electric)
let fuel=[100,null,100,100,null,100,100,100,100]; // index 8 = monster truck 2

// ── Rocket ship ────────────────────────────────────────────────────────────
const ROCKET={x:500,y:1500,built:true,fixed:false,fueled:false,charged:false,boarded:false,launching:false,launchT:0,launched:false,col:'#ECEFF1',trimCol:'#F44336'};
let rocketFlame=[];

// ── Fire system ────────────────────────────────────────────────────────────
let fires=[];
let fireTimer=600+Math.floor(Math.random()*400);
const FIRE_SPOTS=[
  {x:700,y:700},{x:1300,y:700},{x:2200,y:700},{x:700,y:2400},{x:1300,y:2400},{x:2200,y:2400},
  {x:1700,y:1200},{x:1700,y:1800},{x:900,y:1500},{x:2500,y:1500}
];

function updateFires(){
  fireTimer--;
  if(fireTimer<=0&&fires.length<3){
    fireTimer=500+Math.floor(Math.random()*400);
    const spot=FIRE_SPOTS[Math.floor(Math.random()*FIRE_SPOTS.length)];
    if(!fires.find(f=>Math.abs(f.x-spot.x)<100))
      fires.push({x:spot.x,y:spot.y,size:1,maxSize:40,alive:true,particles:[]});
    showMsg('🔥 FIRE ALERT! Drive Fire Truck (8) to put it out!');
  }
  for(const f of fires){
    if(!f.alive)continue;
    f.size=Math.min(f.maxSize,f.size+0.04);
    if(Math.random()<0.3){
      f.particles.push({x:f.x+(Math.random()-0.5)*f.size,y:f.y,
        vx:(Math.random()-0.5)*1.5,vy:-1.5-Math.random()*2,
        life:30+Math.random()*20,maxLife:45,r:4+Math.random()*6,
        col:Math.random()<0.5?'#FF6F00':'#FFEB3B'});
    }
    for(let i=f.particles.length-1;i>=0;i--){
      const p=f.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;p.r+=0.1;
      if(p.life<=0)f.particles.splice(i,1);
    }
  }
}

function drawFires(){
  for(const f of fires){
    if(!f.alive)continue;
    for(const p of f.particles){
      const [px,py]=w2s(p.x,p.y);
      const t=p.life/p.maxLife;
      ctx.globalAlpha=t*0.9;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    const [fx,fy]=w2s(f.x,f.y);
    const grd=ctx.createRadialGradient(fx,fy,0,fx,fy,f.size*1.5);
    grd.addColorStop(0,'rgba(255,220,0,0.8)');
    grd.addColorStop(0.4,'rgba(255,100,0,0.6)');
    grd.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(fx,fy,f.size*1.5,0,Math.PI*2);ctx.fill();
    ctx.font=(12+f.size*0.4)+'px Arial';ctx.textAlign='center';
    ctx.fillText('🔥',fx,fy+5);
  }
}

function updateRocket(){
  if(ROCKET.launching){
    ROCKET.launchT+=0.014;
    if(Math.random()<0.5){
      rocketFlame.push({x:ROCKET.x+(Math.random()-0.5)*24,y:ROCKET.y+55,
        vx:(Math.random()-0.5)*4,vy:3+Math.random()*4,
        life:30,maxLife:30,r:10+Math.random()*10,col:Math.random()<0.5?'#FF6F00':'#FFEB3B'});
    }
    ROCKET.y-=ROCKET.launchT*1.2;
    if(ROCKET.launchT>6){
      ROCKET.launched=true;ROCKET.launching=false;
      score+=500;updateScoreUI();
      rocketFlame=[];
      setTimeout(()=>enterSpace(),400);
    }
  }
  for(let i=rocketFlame.length-1;i>=0;i--){
    const p=rocketFlame[i];p.x+=p.vx;p.y+=p.vy;p.life--;p.r+=0.3;
    if(p.life<=0)rocketFlame.splice(i,1);
  }
}

// ── SPACE MODE ──────────────────────────────────────────────────────────────
let spaceMode=false;
const SPACE_H=3200;
const SPACE_STARS=[];
(function genStars(){for(let i=0;i<320;i++) SPACE_STARS.push({x:Math.random()*1800,y:Math.random()*SPACE_H,r:Math.random()*1.8+0.2,blink:Math.random()*Math.PI*2,speed:0.3+Math.random()*1.4});}());
const MOON_POS={x:600,y:220,r:95};
const EARTH_POS={x:600,y:2950,r:420};
const ASTEROID_BELT=[];
(function genAster(){for(let i=0;i<18;i++) ASTEROID_BELT.push({x:100+Math.random()*1400,y:1100+Math.random()*400,r:6+Math.random()*18,angle:Math.random()*Math.PI*2,spin:( Math.random()-0.5)*0.03,col:['#546E7A','#607D8B','#78909C','#455A64'][Math.floor(Math.random()*4)]});}());
let spaceSat={angle:0,orbitR:320,cx:600,cy:1500};
let spaceCam={y:2500};
let spaceRocket={x:600,y:2700,vx:0,vy:-2.5,angle:-Math.PI/2};
let moonLanded=false;
let spaceParts=[];
let spaceRocketFlame=[];   // persistent fire trail behind rocket
let autopilot=false;       // 'P' key toggles this

function enterSpace(){
  spaceMode=true;autopilot=false;
  spaceRocket.x=600;spaceRocket.y=2700;
  spaceRocket.vx=0;spaceRocket.vy=-2.5;
  spaceRocket.angle=-Math.PI/2;
  spaceCam.y=spaceRocket.y-canvas.height*0.65;
  moonLanded=false;spaceParts=[];spaceRocketFlame=[];
  showMsg('🚀 YOU\'RE IN SPACE!<br>▲ Thrust  ◀▶ Rotate  P = AUTOPILOT 🤖<br>SPACE near Moon = Land!');
}

function landOnMoon(){
  if(!spaceMode)return;
  const dx=spaceRocket.x-MOON_POS.x,dy=spaceRocket.y-MOON_POS.y;
  if(Math.sqrt(dx*dx+dy*dy)<MOON_POS.r+50){
    if(moonLanded)return;
    moonLanded=true;
    spaceRocket.vx=0;spaceRocket.vy=0;
    spaceRocket.x=MOON_POS.x;
    spaceRocket.y=MOON_POS.y+MOON_POS.r+28;
    score+=1000;updateScoreUI();
    for(let i=0;i<60;i++){
      const a=Math.random()*Math.PI*2,s=1+Math.random()*6;
      spaceParts.push({x:spaceRocket.x,y:spaceRocket.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
        life:80+Math.random()*60,maxLife:120,r:3+Math.random()*6,
        col:['#FFD700','#FF5722','#4CAF50','#2196F3','#E91E63','#fff'][Math.floor(Math.random()*6)]});
    }
    showMsg('🌕🏆 YOU LANDED ON THE MOON!<br>INCREDIBLE! +1000 pts!<br>Fly back to Earth 🌍 to return!');
  } else {
    showMsg('🌕 Fly closer to the Moon first!');
  }
}

function returnToEarth(){
  spaceMode=false;
  ROCKET.launched=false;ROCKET.launching=false;ROCKET.launchT=0;
  ROCKET.fixed=false;ROCKET.fueled=false;ROCKET.charged=false;ROCKET.boarded=false;
  ROCKET.x=500;ROCKET.y=1500;
  rocketFlame=[];
  showMsg('🌍 Welcome back to Earth!<br>The rocket needs fixing again — rebuild and relaunch!');
}

function updateSpaceMode(){
  if(!spaceMode)return;
  const LAND_X=MOON_POS.x, LAND_Y=MOON_POS.y+MOON_POS.r+22;

  if(!moonLanded){
    const manualThrust=keys['ArrowUp']||keys['w']||keys['W'];
    let isThrusting=manualThrust;

    if(autopilot){
      // ── Autopilot: steer & thrust toward landing zone ──
      const tdx=LAND_X-spaceRocket.x, tdy=LAND_Y-spaceRocket.y;
      const dist=Math.sqrt(tdx*tdx+tdy*tdy);
      const targetAngle=Math.atan2(tdy,tdx);
      let diff=targetAngle-spaceRocket.angle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      const rotSpd=0.06;
      if(diff>0.05)spaceRocket.angle+=rotSpd;
      else if(diff<-0.05)spaceRocket.angle-=rotSpd;
      const spd2=Math.sqrt(spaceRocket.vx**2+spaceRocket.vy**2);
      // Thrust if aimed well and not overshooting
      if(Math.abs(diff)<0.5&&dist>MOON_POS.r+40&&spd2<7){
        spaceRocket.vx+=Math.cos(spaceRocket.angle)*0.16;
        spaceRocket.vy+=Math.sin(spaceRocket.angle)*0.16;
        isThrusting=true;
      }
      // Brake hard when close
      if(dist<180&&spd2>2.5){spaceRocket.vx*=0.94;spaceRocket.vy*=0.94;}
      if(dist<80){landOnMoon();}
    } else {
      // ── Manual control ──
      const rotSpd=0.045;
      if(keys['ArrowLeft']||keys['a']||keys['A'])spaceRocket.angle-=rotSpd;
      if(keys['ArrowRight']||keys['d']||keys['D'])spaceRocket.angle+=rotSpd;
      if(manualThrust){
        spaceRocket.vx+=Math.cos(spaceRocket.angle)*0.18;
        spaceRocket.vy+=Math.sin(spaceRocket.angle)*0.18;
      }
      if(keys['ArrowDown']||keys['s']||keys['S']){spaceRocket.vx*=0.93;spaceRocket.vy*=0.93;}
    }

    const spd3=Math.sqrt(spaceRocket.vx**2+spaceRocket.vy**2);
    if(spd3>10){spaceRocket.vx*=10/spd3;spaceRocket.vy*=10/spd3;}
    spaceRocket.x+=spaceRocket.vx;
    spaceRocket.y+=spaceRocket.vy;
    spaceRocket.x=Math.max(60,Math.min(1400,spaceRocket.x));
    spaceRocket.y=Math.max(MOON_POS.y-20,Math.min(EARTH_POS.y+60,spaceRocket.y));

    // ── Fire/exhaust particle trail ──
    const thrustNow=isThrusting;
    const backX=spaceRocket.x-Math.cos(spaceRocket.angle)*14;
    const backY=spaceRocket.y-Math.sin(spaceRocket.angle)*14;
    const count=thrustNow?6:1;
    for(let i=0;i<count;i++){
      const spread=thrustNow?0.5:0.2;
      const a=spaceRocket.angle+Math.PI+(Math.random()-0.5)*spread;
      const spd=thrustNow?(3+Math.random()*6):(0.8+Math.random()*2);
      const cols=['#FF6F00','#FF6F00','#FFEB3B','#FF5722','#FF9800','#fff'];
      spaceRocketFlame.push({
        x:backX+(Math.random()-0.5)*8,y:backY+(Math.random()-0.5)*8,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:thrustNow?(25+Math.random()*20):(10+Math.random()*10),
        maxLife:thrustNow?40:20,
        r:thrustNow?(7+Math.random()*9):(2+Math.random()*4),
        col:cols[Math.floor(Math.random()*cols.length)]
      });
    }
    // Return to earth
    const edx=spaceRocket.x-EARTH_POS.x,edy=spaceRocket.y-EARTH_POS.y;
    if(Math.sqrt(edx*edx+edy*edy)<EARTH_POS.r+10)returnToEarth();
  }

  // Update flame trail
  for(let i=spaceRocketFlame.length-1;i>=0;i--){
    const p=spaceRocketFlame[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.r*=0.95;p.life--;
    if(p.life<=0||p.r<0.4)spaceRocketFlame.splice(i,1);
  }
  // Satellite orbit
  spaceSat.angle+=0.007;
  // Camera follow rocket
  spaceCam.y=spaceRocket.y-canvas.height*0.6;
  spaceCam.y=Math.max(0,Math.min(SPACE_H-canvas.height,spaceCam.y));
  // Celebration particles
  for(let i=spaceParts.length-1;i>=0;i--){
    const p=spaceParts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;p.vy*=0.98;p.life--;
    if(p.life<=0)spaceParts.splice(i,1);
  }
}

function s2sc(wx,wy){return[wx,wy-spaceCam.y];}// space-world to canvas

function drawSpaceMode(){
  if(!spaceMode)return;
  const cw=canvas.width,ch=canvas.height;
  // Deep space background
  const bg=ctx.createLinearGradient(0,0,0,ch);
  bg.addColorStop(0,'#000008');bg.addColorStop(0.6,'#03001a');bg.addColorStop(1,'#060030');
  ctx.fillStyle=bg;ctx.fillRect(0,0,cw,ch);

  // Stars (twinkling)
  const t=Date.now()*0.001;
  for(const s of SPACE_STARS){
    const [sx,sy]=s2sc(s.x,s.y);
    if(sy<-3||sy>ch+3)continue;
    const alpha=0.45+0.55*Math.sin(t*s.speed+s.blink);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(sx%cw,sy,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Asteroid belt
  for(const a of ASTEROID_BELT){
    const [ax,ay]=s2sc(a.x,a.y);
    if(ay<-30||ay>ch+30)continue;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.angle+(Date.now()*0.001*a.spin*20));
    ctx.fillStyle=a.col;
    ctx.beginPath();
    ctx.ellipse(0,0,a.r,a.r*0.7,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }

  // Earth
  const [ex,ey]=s2sc(EARTH_POS.x,EARTH_POS.y);
  if(ey<ch+EARTH_POS.r+20){
    const eg=ctx.createRadialGradient(ex-60,ey-60,20,ex,ey,EARTH_POS.r);
    eg.addColorStop(0,'#81D4FA');eg.addColorStop(0.25,'#29B6F6');
    eg.addColorStop(0.5,'#1976D2');eg.addColorStop(0.75,'#2E7D32');eg.addColorStop(1,'#0D47A1');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex,ey,EARTH_POS.r,0,Math.PI*2);ctx.fill();
    // Atmosphere glow
    const atm=ctx.createRadialGradient(ex,ey,EARTH_POS.r,ex,ey,EARTH_POS.r+40);
    atm.addColorStop(0,'rgba(100,200,255,0.25)');atm.addColorStop(1,'rgba(100,200,255,0)');
    ctx.fillStyle=atm;ctx.beginPath();ctx.arc(ex,ey,EARTH_POS.r+40,0,Math.PI*2);ctx.fill();
    // Cloud patches
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.ellipse(ex-100,ey-110,65,22,0.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex+90,ey+70,55,18,-0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex-40,ey+130,70,20,0.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#81D4FA';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText('🌍 EARTH',ex,ey-EARTH_POS.r-12);
  }

  // Moon
  const [mx2,my2]=s2sc(MOON_POS.x,MOON_POS.y);
  if(my2>-MOON_POS.r-20&&my2<ch+MOON_POS.r){
    // Glow
    const mg=ctx.createRadialGradient(mx2,my2,MOON_POS.r*0.6,mx2,my2,MOON_POS.r*1.8);
    mg.addColorStop(0,'rgba(255,255,220,0.25)');mg.addColorStop(1,'rgba(255,255,220,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx2,my2,MOON_POS.r*1.8,0,Math.PI*2);ctx.fill();
    // Surface
    const ms=ctx.createRadialGradient(mx2-25,my2-25,8,mx2,my2,MOON_POS.r);
    ms.addColorStop(0,'#F5F5F5');ms.addColorStop(0.6,'#BDBDBD');ms.addColorStop(1,'#9E9E9E');
    ctx.fillStyle=ms;ctx.beginPath();ctx.arc(mx2,my2,MOON_POS.r,0,Math.PI*2);ctx.fill();
    // Craters
    const craters=[[-28,-18,20],[22,-38,13],[-8,32,17],[38,18,9],[-42,8,11],[10,-5,6]];
    ctx.fillStyle='rgba(0,0,0,0.18)';
    for(const[cx,cy,cr]of craters){ctx.beginPath();ctx.arc(mx2+cx,my2+cy,cr,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(const[cx,cy,cr]of craters){ctx.beginPath();ctx.arc(mx2+cx-2,my2+cy-2,cr*0.4,0,Math.PI*2);ctx.fill();}
    // Label + pulse ring when near
    ctx.fillStyle='#FFF9C4';ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.fillText('🌕 MOON',mx2,my2-MOON_POS.r-14);
    const ddx=spaceRocket.x-MOON_POS.x,ddy=spaceRocket.y-MOON_POS.y;
    if(Math.sqrt(ddx*ddx+ddy*ddy)<MOON_POS.r+80){
      const pulse=0.4+0.6*Math.sin(Date.now()*0.009);
      ctx.globalAlpha=pulse;ctx.strokeStyle='#FFD700';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(mx2,my2,MOON_POS.r+18,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.fillStyle='#FFD700';ctx.font='bold 13px Arial';
      ctx.fillText('Press SPACE to LAND! 🛬',mx2,my2+MOON_POS.r+26);
    }
    if(moonLanded){
      ctx.fillStyle='#FFD700';ctx.font='bold 13px Arial';ctx.textAlign='center';
      ctx.fillText('🏳️ Landed! Fly back to Earth 🌍',mx2,my2+MOON_POS.r+28);
    }
    // ── Landing Zone / Pad on moon surface ──
    const lzX=mx2, lzY=my2+MOON_POS.r-4;
    // Pad platform
    ctx.fillStyle='#546E7A';ctx.fillRect(lzX-38,lzY,76,10);
    ctx.fillStyle='#455A64';ctx.fillRect(lzX-36,lzY+2,72,6);
    // Pad markings
    ctx.strokeStyle='#FFEB3B';ctx.lineWidth=2;
    ctx.strokeRect(lzX-34,lzY+1,68,8);
    ctx.beginPath();ctx.moveTo(lzX,lzY+1);ctx.lineTo(lzX,lzY+9);ctx.stroke();
    ctx.strokeStyle='rgba(255,235,59,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lzX-17,lzY+1);ctx.lineTo(lzX-17,lzY+9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(lzX+17,lzY+1);ctx.lineTo(lzX+17,lzY+9);ctx.stroke();
    // Blinking beacon lights
    const blink=Math.sin(Date.now()*0.008)>0;
    ctx.fillStyle=blink?'#FF5722':'#B71C1C';
    ctx.beginPath();ctx.arc(lzX-38,lzY+5,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(lzX+38,lzY+5,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=blink?'#FFD700':'#F57F17';
    ctx.beginPath();ctx.arc(lzX,lzY+5,3.5,0,Math.PI*2);ctx.fill();
    // Guide beams (when rocket near)
    const distL=Math.sqrt((spaceRocket.x-MOON_POS.x)**2+(spaceRocket.y-MOON_POS.y)**2);
    if(distL<350){
      const beamA=0.35+0.35*Math.sin(Date.now()*0.006);
      ctx.globalAlpha=beamA*0.6;
      ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.setLineDash([5,8]);
      const [bsrx,bsry]=s2sc(spaceRocket.x,spaceRocket.y);
      ctx.beginPath();ctx.moveTo(lzX-38,lzY);ctx.lineTo(bsrx,bsry);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lzX+38,lzY);ctx.lineTo(bsrx,bsry);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;
    }
    // Landing zone label
    ctx.fillStyle='#FFEB3B';ctx.font='bold 11px Arial';ctx.textAlign='center';
    ctx.fillText('🛬 LANDING ZONE',lzX,lzY+22);
  }

  // Satellite
  const satX=spaceSat.cx+Math.cos(spaceSat.angle)*spaceSat.orbitR;
  const satRY=spaceSat.cy+Math.sin(spaceSat.angle)*spaceSat.orbitR*0.35;
  const [ssx,ssy]=s2sc(satX,satRY);
  if(ssy>-40&&ssy<ch+40){
    // Orbit ellipse
    const [ocx,ocy]=s2sc(spaceSat.cx,spaceSat.cy);
    ctx.strokeStyle='rgba(100,150,255,0.13)';ctx.lineWidth=1;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.ellipse(ocx,ocy,spaceSat.orbitR,spaceSat.orbitR*0.35,0,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.save();ctx.translate(ssx,ssy);ctx.rotate(spaceSat.angle);
    // Body
    ctx.fillStyle='#B0BEC5';ctx.fillRect(-16,-7,32,14);
    ctx.fillStyle='#37474F';ctx.fillRect(-14,-5,28,10);
    // Solar panels
    ctx.fillStyle='#1565C0';ctx.fillRect(-42,-5,24,10);ctx.fillRect(18,-5,24,10);
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.7;
    for(let px=-40;px<-18;px+=5){ctx.beginPath();ctx.moveTo(px,-5);ctx.lineTo(px,5);ctx.stroke();}
    for(let px=20;px<42;px+=5){ctx.beginPath();ctx.moveTo(px,-5);ctx.lineTo(px,5);ctx.stroke();}
    // Antenna
    ctx.strokeStyle='#CFD8DC';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(0,-20);ctx.stroke();
    ctx.fillStyle='#FFEB3B';ctx.beginPath();ctx.arc(0,-20,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.fillStyle='#90A4AE';ctx.font='10px Arial';ctx.textAlign='center';
    ctx.fillText('🛰️ SATELLITE',ssx,ssy-26);
  }

  // ── Fire trail particles ──
  for(const p of spaceRocketFlame){
    const [fpx,fpy]=s2sc(p.x,p.y);
    if(fpy<-20||fpy>ch+20)continue;
    const al=(p.life/p.maxLife)*0.9;
    ctx.globalAlpha=al;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(fpx,fpy,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── Celebration particles ──
  for(const p of spaceParts){
    const [cpx,cpy]=s2sc(p.x,p.y);
    const al=p.life/p.maxLife;
    ctx.globalAlpha=al;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(cpx,cpy,p.r*al,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── Player rocket ──
  const [rsx2,rsy2]=s2sc(spaceRocket.x,spaceRocket.y);
  ctx.save();ctx.translate(rsx2,rsy2);ctx.rotate(spaceRocket.angle+Math.PI/2);
  // Idle engine glow at nozzle
  if(!moonLanded){
    const eg=ctx.createRadialGradient(0,16,0,0,16,18);
    eg.addColorStop(0,'rgba(255,200,50,0.7)');eg.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(0,16,18,0,Math.PI*2);ctx.fill();
  }
  // Body (uses spray-painted colour)
  ctx.fillStyle=ROCKET.col;
  ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(13,15);ctx.lineTo(-13,15);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;ctx.stroke();
  // Nose cone (trim)
  ctx.fillStyle=ROCKET.trimCol;
  ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(9,-20);ctx.lineTo(-9,-20);ctx.closePath();ctx.fill();
  // Body detail lines (brick texture)
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
  for(let yy=-18;yy<14;yy+=10){ctx.beginPath();ctx.moveTo(-11,yy);ctx.lineTo(11,yy);ctx.stroke();}
  // Window with interior glow
  const wg=ctx.createRadialGradient(-2,-8,1,-2,-8,7);
  wg.addColorStop(0,'#E3F2FD');wg.addColorStop(1,'#42A5F5');
  ctx.fillStyle=wg;ctx.beginPath();ctx.arc(0,-8,7,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1565C0';ctx.lineWidth=1.5;ctx.stroke();
  // Fins (trim colour)
  ctx.fillStyle=ROCKET.trimCol;
  ctx.beginPath();ctx.moveTo(-13,15);ctx.lineTo(-24,30);ctx.lineTo(-8,17);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(13,15);ctx.lineTo(24,30);ctx.lineTo(8,17);ctx.closePath();ctx.fill();
  // Engine bells
  ctx.fillStyle='#607D8B';
  ctx.beginPath();ctx.moveTo(-7,15);ctx.lineTo(-9,24);ctx.lineTo(9,24);ctx.lineTo(7,15);ctx.closePath();ctx.fill();
  // Rainbow shimmer if spray-painted
  if(ROCKET.rainbowPaint){
    const rt=Date.now()*0.005;
    for(let ri=0;ri<4;ri++){
      ctx.globalAlpha=0.22;ctx.fillStyle=`hsl(${(rt*50+ri*90)%360},100%,60%)`;
      ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(13,15);ctx.lineTo(-13,15);ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // "YOU" pulsing label
  const pulse2=0.65+0.35*Math.sin(Date.now()*0.007);
  ctx.globalAlpha=pulse2;
  ctx.fillStyle=autopilot?'#00E5FF':'#FFD700';
  ctx.font='bold 13px Arial';ctx.textAlign='center';
  ctx.fillText(autopilot?'🤖 AUTO':'▼ YOU',rsx2,rsy2-50);
  ctx.globalAlpha=1;

  // ── Speed/direction indicator ──
  const spd4=Math.sqrt(spaceRocket.vx**2+spaceRocket.vy**2);
  const spdPct=Math.min(spd4/10,1);
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(cw-80,ch/2-60,18,120);
  ctx.fillStyle=spdPct>0.7?'#FF5722':spdPct>0.4?'#FF9800':'#4CAF50';
  ctx.fillRect(cw-80,ch/2-60+120*(1-spdPct),18,120*spdPct);
  ctx.fillStyle='#fff';ctx.font='9px Arial';ctx.textAlign='center';
  ctx.fillText('SPD',cw-71,ch/2+68);

  // ── Space HUD ──
  const hudH=autopilot?88:72;
  ctx.fillStyle='rgba(0,0,30,0.85)';ctx.fillRect(10,10,310,hudH);
  ctx.strokeStyle=autopilot?'#00E5FF':'#3F51B5';ctx.lineWidth=2;ctx.strokeRect(10,10,310,hudH);
  ctx.textAlign='left';
  if(autopilot){
    ctx.fillStyle='#00E5FF';ctx.font='bold 15px Arial';
    ctx.fillText('🤖 AUTOPILOT ON — Flying to Moon!',20,32);
    ctx.fillStyle='#B0BEC5';ctx.font='11px Arial';
    ctx.fillText('Press P to take manual control',20,50);
    // Autopilot progress bar
    const mdx2=spaceRocket.x-MOON_POS.x,mdy2=spaceRocket.y-MOON_POS.y;
    const distToMoon=Math.sqrt(mdx2*mdx2+mdy2*mdy2);
    const prog=Math.max(0,1-(distToMoon/2600));
    ctx.fillStyle='#333';ctx.fillRect(20,58,270,12);
    ctx.fillStyle='#00E5FF';ctx.fillRect(20,58,270*prog,12);
    ctx.fillStyle='#fff';ctx.font='9px Arial';ctx.textAlign='center';
    ctx.fillText(Math.round(prog*100)+'% to Moon',155,68);
    ctx.textAlign='left';
    ctx.fillStyle='#80DEEA';ctx.font='11px Arial';
    ctx.fillText('Spray paint 🎨 works in space too! Try P or SPACE near Moon',20,86);
  } else {
    ctx.fillStyle='#7986CB';ctx.font='bold 14px Arial';
    ctx.fillText('🚀 SPACE  —  Manual Pilot',20,30);
    ctx.fillStyle='#B0BEC5';ctx.font='11px Arial';
    ctx.fillText('▲ Thrust   ◀▶ Rotate   ▼ Brake',20,47);
    ctx.fillText('P = Autopilot 🤖   SPACE near Moon = Land',20,62);
    ctx.fillText('Paint shop colours show on rocket! 🎨',20,76);
  }

  // ── Moon-landed banner ──
  if(moonLanded){
    const p3=0.6+0.4*Math.sin(Date.now()*0.005);
    ctx.globalAlpha=p3;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(cw/2-230,ch/2-40,460,58);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.strokeRect(cw/2-230,ch/2-40,460,58);
    ctx.fillStyle='#FFD700';ctx.font='bold 24px Arial';ctx.textAlign='center';
    ctx.fillText('🌕 LANDED ON THE MOON! +1000 pts 🏆',cw/2,ch/2-10);
    ctx.fillStyle='#fff';ctx.font='14px Arial';
    ctx.fillText('Fly back down to 🌍 Earth to return home!',cw/2,ch/2+12);
    ctx.globalAlpha=1;
  }
}

function drawRocket(){
  if(ROCKET.launched)return;
  const [rx,ry]=w2s(ROCKET.x,ROCKET.y);
  ctx.save();ctx.translate(rx,ry);

  if(!ROCKET.built){
    // Draw construction scaffold / placeholder
    ctx.strokeStyle='#FF8F00';ctx.lineWidth=3;ctx.setLineDash([6,4]);
    ctx.strokeRect(-55,-80,110,140);ctx.setLineDash([]);
    ctx.fillStyle='#FF8F00';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText('🚀 BUILD ROCKET',0,-90);
    ctx.fillStyle='#FFF9C4';ctx.font='11px Arial';
    ctx.fillText('Need: 🧱×8 ⚙️×5 🪟×3',0,-72);
    ctx.fillText('Drive here + SPACE',0,-56);
    // Scaffold poles
    ctx.strokeStyle='#FF8F00';ctx.lineWidth=4;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(-50,50);ctx.lineTo(-50,-70);ctx.stroke();
    ctx.beginPath();ctx.moveTo(50,50);ctx.lineTo(50,-70);ctx.stroke();
    for(let yy=-60;yy<50;yy+=25){
      ctx.beginPath();ctx.moveTo(-50,yy);ctx.lineTo(50,yy);ctx.stroke();
    }
    ctx.restore();return;
  }

  // Launch pad base
  ctx.fillStyle='#546E7A';ctx.fillRect(-55,42,110,22);
  ctx.fillStyle='#37474F';ctx.fillRect(-44,32,88,14);
  // Flame particles
  for(const p of rocketFlame){
    const [px,py]=w2s(p.x,p.y);
    const t=p.life/p.maxLife;
    ctx.globalAlpha=t;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(px-rx,py-ry,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Rocket body (paintable colour)
  ctx.fillStyle=ROCKET.col;
  ctx.beginPath();ctx.moveTo(0,-75);ctx.lineTo(20,12);ctx.lineTo(-20,12);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#90A4AE';ctx.lineWidth=2;ctx.stroke();
  // Nose cone (trim colour)
  ctx.fillStyle=ROCKET.trimCol;
  ctx.beginPath();ctx.moveTo(0,-75);ctx.lineTo(13,-48);ctx.lineTo(-13,-48);ctx.closePath();ctx.fill();
  // Brick texture stripes on body
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  for(let yy=-48;yy<12;yy+=12){
    ctx.beginPath();ctx.moveTo(yy%24===0?-14:-20,yy);ctx.lineTo(yy%24===0?14:20,yy);ctx.stroke();
  }
  // Window porthole
  ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.arc(0,-32,10,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.stroke();
  if(ROCKET.boarded){
    // Astronaut face in window!
    ctx.fillStyle='#FF8A65';ctx.beginPath();ctx.arc(0,-32,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('🧑‍🚀',0,-29);
  } else {
    ctx.fillStyle='#E3F2FD';ctx.beginPath();ctx.arc(-3,-35,4,0,Math.PI*2);ctx.fill();
  }
  // Boarding hatch door (open when boarded)
  if(ROCKET.boarded){
    ctx.fillStyle='#546E7A';ctx.fillRect(8,-20,12,18);
    ctx.strokeStyle='#37474F';ctx.lineWidth=1;ctx.strokeRect(8,-20,12,18);
    ctx.fillStyle='#FFD700';ctx.font='8px Arial';ctx.textAlign='center';
    ctx.fillText('IN',14,-9);
  }
  // Fins (trim colour)
  ctx.fillStyle=ROCKET.trimCol;
  ctx.beginPath();ctx.moveTo(-20,12);ctx.lineTo(-36,38);ctx.lineTo(-14,20);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(20,12);ctx.lineTo(36,38);ctx.lineTo(14,20);ctx.closePath();ctx.fill();
  // Engine nozzle
  ctx.fillStyle='#607D8B';ctx.fillRect(-11,12,22,18);
  ctx.fillStyle='#455A64';ctx.fillRect(-7,26,14,6);
  // Rainbow shimmer if spray painted
  if(ROCKET.rainbowPaint){
    const t=Date.now()*0.003;
    for(let r=0;r<3;r++){
      ctx.globalAlpha=0.18;
      ctx.fillStyle=`hsl(${(t*60+r*120)%360},100%,60%)`;
      ctx.beginPath();ctx.moveTo(0,-75);ctx.lineTo(20,12);ctx.lineTo(-20,12);ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // Status indicators
  const statY=58;
  ctx.fillStyle=ROCKET.fixed?'#4CAF50':'#F44336';ctx.beginPath();ctx.arc(-22,statY,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ROCKET.fueled?'#FF9800':'#F44336';ctx.beginPath();ctx.arc(0,statY,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ROCKET.charged?'#00BCD4':'#F44336';ctx.beginPath();ctx.arc(22,statY,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='8px Arial';ctx.textAlign='center';
  ctx.fillText('🔧',-22,statY+3);ctx.fillText('⛽',0,statY+3);ctx.fillText('🔋',22,statY+3);
  // Label
  ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='center';
  ctx.fillText('🚀 ROCKET',0,78);
  const pulse=Math.sin(Date.now()*0.005)*0.4+0.7;
  if(ROCKET.boarded){
    // Boarded: flash LAUNCH!
    ctx.globalAlpha=pulse;ctx.fillStyle='#FF5722';ctx.font='bold 13px Arial';
    ctx.fillText('🔥 SPACE to LAUNCH!',0,94);ctx.globalAlpha=1;
  } else if(ROCKET.fixed&&ROCKET.fueled&&ROCKET.charged){
    // Ready to board!
    ctx.globalAlpha=pulse;ctx.fillStyle='#00E5FF';ctx.font='bold 13px Arial';
    ctx.fillText('🧑‍🚀 GET IN! (SPACE)',0,94);ctx.globalAlpha=1;
  } else if(!ROCKET.fixed||!ROCKET.fueled||!ROCKET.charged){
    ctx.globalAlpha=pulse;ctx.fillStyle='#FFD700';ctx.font='bold 11px Arial';
    const hint=!ROCKET.fixed?'Fix me! (Fix Truck)':!ROCKET.fueled?'Fuel me! (Gas station)':'Charge me! (2 batteries)';
    ctx.fillText(hint,0,94);ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawPaintShop(){
  const [px,py]=w2s(PAINT_SHOP.x,PAINT_SHOP.y);
  const W=PAINT_SHOP.w, H=PAINT_SHOP.h;

  ctx.fillStyle='#E91E63';ctx.fillRect(px,py,W,20);

  // ── Paint type toggle buttons ──────────────────────
  const btnW=90,btnH=28,btnY=py+24;
  // Normal paint button
  const normActive=paintType==='normal';
  ctx.fillStyle=normActive?'#1565C0':'#90CAF9';
  ctx.fillRect(px+6,btnY,btnW,btnH);
  ctx.strokeStyle=normActive?'#FFD700':'#888';ctx.lineWidth=normActive?2.5:1;

  ctx.fillRect(px+W-btnW-6,btnY,btnW,btnH);
  ctx.strokeStyle=sprayActive?'#FFD700':'#888';ctx.lineWidth=sprayActive?2.5:1;
  ctx.strokeRect(px+W-btnW-6,btnY,btnW,btnH);
  ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='center';
  ctx.fillText('🌈 Spray Paint',px+W-btnW-6+btnW/2,btnY+18);

  // ── Colour swatches ────────────────────────────────
  const sw=16,gap=2,startX=px+7,swY=py+58;
  for(let i=0;i<RAINBOW.length;i++){
    ctx.fillStyle=RAINBOW[i];
    ctx.fillRect(startX+i*(sw+gap),swY,sw,sw);
    ctx.strokeStyle=i===selectedPaint?'#FFD700':'#555';
    ctx.lineWidth=i===selectedPaint?3:1;
    ctx.strokeRect(startX+i*(sw+gap),swY,sw,sw);
    if(i===selectedPaint){
      ctx.fillStyle='#FFD700';ctx.font='11px Arial';ctx.textAlign='center';
      ctx.fillText('▼',startX+i*(sw+gap)+sw/2,swY-2);
    }
  }

  // ── Current selection display ──────────────────────
  ctx.fillStyle=RAINBOW[selectedPaint];
  ctx.fillRect(px+W/2-28,py+82,56,32);
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.strokeRect(px+W/2-28,py+82,56,32);

  // Spray dots preview if spray mode
  if(paintType==='spray'){
    for(let d=0;d<10;d++){
      ctx.globalAlpha=0.6;
      ctx.fillStyle=RAINBOW[(selectedPaint+Math.floor(d/3))%RAINBOW.length];
      ctx.beginPath();
      ctx.arc(px+W/2-28+56+8+Math.cos(d*1.1)*12,py+82+16+Math.sin(d*0.9)*10,2+Math.random()*2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  ctx.fillStyle='#333';ctx.font='9px Arial';ctx.textAlign='center';
  ctx.fillText(RAINBOW_NAMES[selectedPaint],px+W/2,py+128);

  // Instructions
  ctx.font='9px Arial';
  ctx.fillStyle='#555';
  ctx.fillText('SPACE here = pick colour & type',px+W/2,py+142);
  ctx.fillStyle=paintType==='spray'?'#7B1FA2':'#1565C0';
  ctx.fillText(paintType==='normal'?'Normal: instant solid colour →':'Spray: rainbow mist effect →',px+W/2,py+155);
  ctx.fillStyle='#333';
  ctx.fillText('SPACE near any car or the rocket!',px+W/2,py+168);

  // Paint mode active indicator
  if(paintMode){
    const pulse=Math.sin(Date.now()*0.01)*0.4+0.8;
    ctx.globalAlpha=pulse;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=4;ctx.strokeRect(px-4,py-4,W+8,H+8);
    ctx.fillStyle='#FFD700';ctx.font='bold 11px Arial';ctx.textAlign='center';
    ctx.fillText('🎨 READY — drive to a car!',px+W/2,py+H+14);
    ctx.globalAlpha=1;
  }
}

function updateSprayParticles(){
  for(let i=sprayParticles.length-1;i>=0;i--){
    const p=sprayParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;p.r*=0.97;
    if(p.life<=0)sprayParticles.splice(i,1);

}

function drawSprayParticles(){

    const t=p.life/p.maxLife;
    ctx.globalAlpha=t*0.85;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(sx,sy,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// train (idx 4) and tesla (idx 1) can break down
const BREAKDOWNS={
  train: {broken:false, breakTimer:1800+Math.floor(Math.random()*1200), smokeParticles:[], fixProgress:0},
  tesla: {broken:false, breakTimer:1200+Math.floor(Math.random()*900),  smokeParticles:[], fixProgress:0},
};
let fixAlert=0; // flicker timer for fix prompt

function updateBreakdowns(){
  const trainV=vehicles[4], teslaV=vehicles[1];
  if(!trainV||!teslaV)return;

  // Train breakdown timer
  const tb=BREAKDOWNS.train;
  if(!tb.broken){
    tb.breakTimer--;
    if(tb.breakTimer<=0){
      tb.broken=true;
      tb.fixProgress=0;
      tb.breakTimer=2400+Math.floor(Math.random()*1200);
      showMsg('🔧 TRAIN ENGINE BROKEN!<br>Drive your Crane or Excavator close and press SPACE to fix!');
    }
  } else {
    // Smoke from broken train
    if(Math.random()<0.3){
      tb.smokeParticles.push({x:trainV.x+(Math.random()-0.5)*20,y:trainV.y-20,
        vx:(Math.random()-0.5)*0.8,vy:-1.2,life:60,maxLife:60,r:10+Math.random()*8});
    }
  }

  // Tesla battery breakdown
  const telb=BREAKDOWNS.tesla;
  if(!telb.broken){
    // Also break if Tesla charge hits 0 while auto-driving
    if(teslaV.charge!==null&&teslaV.charge<=0&&activeV!==1){
      telb.broken=true;telb.fixProgress=0;
      showMsg('🔋 TESLA BATTERY DEAD!<br>Drive your Crane or Excavator close and press SPACE to fix!');
    }
    telb.breakTimer--;
    if(telb.breakTimer<=0&&!telb.broken){
      telb.broken=true;telb.fixProgress=0;
      telb.breakTimer=1800+Math.floor(Math.random()*900);
      showMsg('🔋 TESLA BATTERY DEAD!<br>Drive your Crane or Excavator close and press SPACE to fix!');
    }
  } else {
    if(Math.random()<0.2){
      telb.smokeParticles.push({x:teslaV.x+(Math.random()-0.5)*16,y:teslaV.y-16,
        vx:(Math.random()-0.5)*0.6,vy:-0.9,life:50,maxLife:50,r:8+Math.random()*6});
    }
  }

  // Update smoke particles
  for(const bd of Object.values(BREAKDOWNS)){
    for(let i=bd.smokeParticles.length-1;i>=0;i--){
      const s=bd.smokeParticles[i];s.x+=s.vx;s.y+=s.vy;s.life--;s.r+=0.2;
      if(s.life<=0)bd.smokeParticles.splice(i,1);
    }
  }

  // Flash alert
  fixAlert=(fixAlert+1)%60;
}

    if(spaceMode){
      autopilot=!autopilot;

      else showMsg('✋ Manual control! Arrow keys to fly.');

    if(spaceMode){ landOnMoon(); }

});
