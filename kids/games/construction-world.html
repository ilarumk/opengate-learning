function switchV(i){if(i>=VDEFS.length)return;activeV=i;updateVehicleUI();showMsg(VDEFS[i].label+' — ready to drive!');}

function doAction(){
  const v=vehicles[activeV];
  const canFix=v.type==='crane'||v.type==='excavator'||v.type==='fixtruck';
  // Fix truck is EXTRA powerful — fixes faster!
  const fixPower=v.type==='fixtruck'?0.5:0.25;

  // ── Fix broken TRAIN ────────────────────────────────
  if(canFix&&BREAKDOWNS.train.broken){
    const tv=vehicles[4];
    const dx=v.x-tv.x, dy=v.y-tv.y;
    if(Math.sqrt(dx*dx+dy*dy)<160){
      const bd=BREAKDOWNS.train;
      bd.fixProgress=Math.min(1,bd.fixProgress+fixPower);
      spawnParty(tv.x,tv.y);
      if(bd.fixProgress>=1){
        bd.broken=false;bd.fixProgress=0;bd.smokeParticles=[];
        score+=200;updateScoreUI();
        showMsg('✅ TRAIN ENGINE FIXED! Amazing work! +200 pts! 🚂');
      } else {
        showMsg('🔧 Fixing train... '+(bd.fixProgress*100).toFixed(0)+'% — press SPACE again!');
      }
      return;
    }
  }

  // ── Fix broken TESLA ────────────────────────────────
  if(canFix&&BREAKDOWNS.tesla.broken){
    const tv=vehicles[1];
    const dx=v.x-tv.x, dy=v.y-tv.y;
    if(Math.sqrt(dx*dx+dy*dy)<160){
      const bd=BREAKDOWNS.tesla;
      bd.fixProgress=Math.min(1,bd.fixProgress+fixPower);
      spawnParty(tv.x,tv.y);
      if(bd.fixProgress>=1){
        bd.broken=false;bd.fixProgress=0;bd.smokeParticles=[];
        tv.charge=100;tv.maxSpeed=VDEFS[1].maxSpeed;
        score+=200;updateScoreUI();
        showMsg('⚡ TESLA BATTERY RECHARGED! Awesome! +200 pts! 🚗');
      } else {
        showMsg('🔋 Charging Tesla... '+(bd.fixProgress*100).toFixed(0)+'% — press SPACE again!');
      }
      return;
    }
  }

  // ── Try to build near a build zone ──────────────────
  for(const bz of BUILD_ZONES){
    if(bz.done)continue;
    const dx=v.x-(bz.x+bz.w/2), dy=v.y-(bz.y+bz.h/2);
    if(Math.sqrt(dx*dx+dy*dy)<140){tryBuild(bz);return;}
  }

  // ── Charge Tesla at charger station ─────────────────
  const charger=BUILD_ZONES.find(b=>b.id==='charger'&&b.done);
  if(charger&&v.type==='tesla'){
    const dx=v.x-(charger.x+charger.w/2), dy=v.y-(charger.y+charger.h/2);
    if(Math.sqrt(dx*dx+dy*dy)<160){v.charge=100;showMsg('⚡ Tesla fully charged! Zoom!');return;}
  }

  // ── Paint shop: pick colour & type ──────────────────
  {const dx=v.x-(PAINT_SHOP.x+PAINT_SHOP.w/2),dy=v.y-(PAINT_SHOP.y+PAINT_SHOP.h/2);
  if(Math.sqrt(dx*dx+dy*dy)<140){
    selectedPaint=(selectedPaint+1)%RAINBOW.length;
    // Toggle paint type when we cycle back to 0
    if(selectedPaint===0) paintType=paintType==='normal'?'spray':'normal';
    paintMode=true;
    const typeLabel=paintType==='spray'?'🌈 SPRAY paint (rainbow mist)':'🪣 NORMAL paint (solid colour)';
    showMsg(typeLabel+'<br>Colour: '+RAINBOW_NAMES[selectedPaint]+'<br>Drive to any car OR the rocket and press SPACE!');
    return;
  }}

  // ── Paint a vehicle ──────────────────────────────────
  if(paintMode){
    for(let i=0;i<vehicles.length;i++){
      if(i===activeV)continue;
      const ov=vehicles[i];
      const dx=v.x-ov.x,dy=v.y-ov.y;
      if(Math.sqrt(dx*dx+dy*dy)<110){
        if(paintType==='normal'){
          // Normal paint: instant solid colour
          ov.col=RAINBOW[selectedPaint];
          ov.trim=RAINBOW[(selectedPaint+3)%RAINBOW.length];
          paintMode=false;
          spawnParty(ov.x,ov.y);
          score+=20;updateScoreUI();
          showMsg('🪣 '+ov.label+' painted '+RAINBOW_NAMES[selectedPaint]+'! +20 pts!');
        } else {
          // Spray paint: burst of rainbow particles + colour applied
          for(let s=0;s<35;s++){
            const ang=Math.random()*Math.PI*2;
            const spd=1+Math.random()*4;
            sprayParticles.push({
              x:ov.x+(Math.random()-0.5)*ov.w,
              y:ov.y+(Math.random()-0.5)*ov.h,
              vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
              life:40+Math.random()*30,maxLife:65,
              r:3+Math.random()*5,
              col:RAINBOW[(selectedPaint+Math.floor(Math.random()*4))%RAINBOW.length]
            });
          }
          // Rainbow gradient: mix colours
          ov.col=RAINBOW[selectedPaint];
          ov.trim=RAINBOW[(selectedPaint+2)%RAINBOW.length];
          ov.rainbowPaint=true; // flag for rainbow shimmer effect
          paintMode=false;
          score+=30;updateScoreUI();
          showMsg('🌈 RAINBOW SPRAY on '+ov.label+'! Awesome! +30 pts!');
        }
        return;
      }
    }
    // Also allow painting the rocket!
    if(ROCKET.built&&!ROCKET.launching&&!ROCKET.launched){
      const dx=v.x-ROCKET.x,dy=v.y-ROCKET.y;
      if(Math.sqrt(dx*dx+dy*dy)<140){
        if(paintType==='normal'){
          ROCKET.col=RAINBOW[selectedPaint];
          ROCKET.trimCol=RAINBOW[(selectedPaint+3)%RAINBOW.length];
          ROCKET.rainbowPaint=false;
          paintMode=false;spawnParty(ROCKET.x,ROCKET.y);score+=25;updateScoreUI();
          showMsg('🪣 Rocket painted '+RAINBOW_NAMES[selectedPaint]+'! Looking sharp! +25 pts!');
        } else {
          for(let s=0;s<40;s++){
            const ang=Math.random()*Math.PI*2;const spd=1+Math.random()*5;
            sprayParticles.push({x:ROCKET.x+(Math.random()-0.5)*60,y:ROCKET.y+(Math.random()-0.5)*120,
              vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,life:50+Math.random()*30,maxLife:75,
              r:4+Math.random()*5,col:RAINBOW[(selectedPaint+Math.floor(Math.random()*5))%RAINBOW.length]});
          }
          ROCKET.col=RAINBOW[selectedPaint];
          ROCKET.trimCol=RAINBOW[(selectedPaint+2)%RAINBOW.length];
          ROCKET.rainbowPaint=true;paintMode=false;score+=40;updateScoreUI();
          showMsg('🌈 RAINBOW SPRAY on ROCKET! Cosmic! +40 pts!');
        }
        return;
      }
    }
    showMsg('Drive closer to a vehicle or the rocket to paint it!');
  }

  // ── Gas station: refuel ──────────────────────────────
  {const dx=v.x-(GAS_STATION.x+GAS_STATION.w/2),dy=v.y-(GAS_STATION.y+GAS_STATION.h/2);
  if(Math.sqrt(dx*dx+dy*dy)<140&&fuel[activeV]!==null){
    fuel[activeV]=100;
    spawnParty(v.x,v.y);
    showMsg('⛽ Tank full! Ready to go! 🚗');
    return;
  }}

  // ── Rocket: fix, fuel, charge, launch ───────────────
  {const dx=v.x-ROCKET.x,dy=v.y-ROCKET.y;
  if(Math.sqrt(dx*dx+dy*dy)<160){
    if(!ROCKET.built){
      showMsg('🧱 Build the Rocket Pad first! Drive here with bricks+steel+glass and press SPACE!');
      return;
    }
    if(!ROCKET.fixed&&canFix){
      ROCKET.fixed=true;spawnParty(ROCKET.x,ROCKET.y);
      showMsg('🔧 Rocket engine fixed! ✅ Now fuel it — drive to gas station then come back!');
      return;
    }
    if(!ROCKET.fueled&&fuel[activeV]!==null&&fuel[activeV]>30){
      ROCKET.fueled=true;fuel[activeV]-=30;
      showMsg('⛽ Rocket fueled! ✅ Now charge it — bring 2 batteries!');
      return;
    }
    if(!ROCKET.charged&&inv.battery>=2){
      ROCKET.charged=true;inv.battery-=2;updateInvUI();
      showMsg('🔋 Rocket charged! ✅ Press SPACE to LAUNCH! 🚀');
      return;
    }
    if(ROCKET.fixed&&ROCKET.fueled&&ROCKET.charged&&!ROCKET.boarded&&!ROCKET.launching){
      ROCKET.boarded=true;
      showMsg('🧑‍🚀 You\'re INSIDE the rocket!<br>Press SPACE again to LAUNCH! 🚀🔥');
      return;
    }
    if(ROCKET.boarded&&!ROCKET.launching){
      ROCKET.launching=true;
      showMsg('🚀 3... 2... 1... BLAST OFF! 🌟🌟🌟');
      return;
    }
    if(!ROCKET.fixed)showMsg('🔧 Use Fix Truck (key 7) or Crane (key 4) to fix the rocket engine!');
    else if(!ROCKET.fueled)showMsg('⛽ Fill up at gas station first, then come back to fuel the rocket!');
    else if(!ROCKET.charged)showMsg('🔋 Collect 2 batteries first, then come back to charge the rocket!');
    return;
  }}

  // ── Fire truck: extinguish fire ──────────────────────
  if(v.type==='firetruck'){sprayWater();return;}

  // ── Hints ────────────────────────────────────────────
  if(BREAKDOWNS.train.broken||BREAKDOWNS.tesla.broken){
    showMsg('🔧 Something is broken! Use Fix Truck (7) or Crane (4) to fix it!');
  } else if(fires.length>0){
    showMsg('🔥 Fire! Drive the Fire Truck (8) and press Q to spray water!');
  } else {
    showMsg('Drive near a 🏗️ build site and press SPACE to build!');
  }
}

let waterParticles=[];
function sprayWater(){
  const v=vehicles[activeV];
  if(v.type!=='firetruck')return;
  // Spray water forward
  for(let i=0;i<8;i++){
    waterParticles.push({
      x:v.x+Math.cos(v.angle)*30,y:v.y+Math.sin(v.angle)*30,
      vx:Math.cos(v.angle+((Math.random()-0.5)*0.5))*10,
      vy:Math.sin(v.angle+((Math.random()-0.5)*0.5))*10,
      life:25,maxLife:25,r:5+Math.random()*4
    });
  }
  // Check if water hits a fire
  for(let i=fires.length-1;i>=0;i--){
    const f=fires[i];
    const dx=f.x-v.x,dy=f.y-v.y;
    if(Math.sqrt(dx*dx+dy*dy)<120){
      f.size=Math.max(0,f.size-8);
      if(f.size<=0){
        fires.splice(i,1);score+=150;updateScoreUI();
        showMsg('💧 Fire extinguished! Great work! +150 pts! 🚒');
        spawnParty(f.x,f.y);
      }
    }
  }
}

function updateWater(){
  for(let i=waterParticles.length-1;i>=0;i--){
    const p=waterParticles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;
    if(p.life<=0)waterParticles.splice(i,1);
  }
}

function drawWater(){
  for(const p of waterParticles){
    const [px,py]=w2s(p.x,p.y);
    const t=p.life/p.maxLife;
    ctx.globalAlpha=t*0.8;ctx.fillStyle='#29B6F6';
    ctx.beginPath();ctx.ellipse(px,py,p.r,p.r*0.6,0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Vehicle update ─────────────────────────────────────────────────────────
let waveT=0;
function updateVehicles(){
  const up=keys['ArrowUp']||keys['w']||keys['W'];
  const dn=keys['ArrowDown']||keys['s']||keys['S'];
  const lt=keys['ArrowLeft']||keys['a']||keys['A'];
  const rt=keys['ArrowRight']||keys['d']||keys['D'];

  const v=vehicles[activeV];

  if(v.onTrack){
    // Train stays on track
    if(up) trainT+=0.0015;
    if(dn) trainT-=0.0006;
    trainT=(trainT+1)%1;
    const pos=getTrackPos(trainT);
    v.x=pos.x;v.y=pos.y;v.angle=pos.angle;
    v.speed=up?3:dn?-1:1.2;
  } else {
    if(up) v.speed=Math.min(v.maxSpeed,v.speed+v.accel);
    else v.speed=Math.max(0,v.speed-0.06);
    if(dn) v.speed=Math.max(0,v.speed-0.12);
    if(v.turn>0){
      if(lt) v.angle-=v.turn*(v.speed/v.maxSpeed*0.6+0.4);
      if(rt) v.angle+=v.turn*(v.speed/v.maxSpeed*0.6+0.4);
    }
    const nx=v.x+Math.cos(v.angle)*v.speed;
    const ny=v.y+Math.sin(v.angle)*v.speed;
    v.x=Math.max(20,Math.min(W.w-20,nx));
    v.y=Math.max(20,Math.min(W.h-20,ny));

    // Fuel drain for gas vehicles
    if(fuel[activeV]!==null&&v.speed>0.5){
      fuel[activeV]=Math.max(0,fuel[activeV]-0.015);
      if(fuel[activeV]<=0){
        v.maxSpeed=1.5;
        if(Math.floor(fuel[activeV]*10)%30===0) showMsg('⛽ OUT OF FUEL! Drive to Gas Station (yellow building)!');
      } else {
        v.maxSpeed=VDEFS[activeV]?VDEFS[activeV].maxSpeed:v.maxSpeed;
      }
    }
    // Tesla drains charge
    if(v.type==='tesla'&&v.speed>0.5){
      v.charge=Math.max(0,v.charge-0.02);
      if(v.charge<=0){v.maxSpeed=2.5;}else{v.maxSpeed=VDEFS[1].maxSpeed;}
    }
    // Crane arm
    if(v.type==='crane'){
      if(keys['q']||keys['Q']) v.craneArm=Math.max(0,v.craneArm-1);
      if(keys['e']||keys['E']) v.craneArm=Math.min(120,v.craneArm+1);
    }
    // Excavator arm
    if(v.type==='excavator'){
      if(keys['q']||keys['Q']) v.bucketArm=Math.max(0,v.bucketArm-1.5);
      if(keys['e']||keys['E']) v.bucketArm=Math.min(90,v.bucketArm+1.5);
      if(keys['z']||keys['Z']) v.bucketAngle=Math.max(20,v.bucketAngle-2);
      if(keys['x']||keys['X']) v.bucketAngle=Math.min(140,v.bucketAngle+2);
    }
  }

  // Camera
  cam.x=v.x-canvas.width/2;
  cam.y=v.y-canvas.height/2;
  cam.x=Math.max(0,Math.min(W.w-canvas.width,cam.x));
  cam.y=Math.max(0,Math.min(W.h-canvas.height,cam.y));

  const fuelStr=fuel[activeV]!==null?' ⛽'+Math.floor(fuel[activeV])+'%':v.type==='tesla'?' ⚡'+Math.floor(v.charge||0)+'%':'';
  document.getElementById('vspeed').textContent='Speed: '+Math.abs(v.speed).toFixed(1)+fuelStr;
  updateVehicleUI();
}

function updateVehicleUI(){
  const v=vehicles[activeV];
  document.getElementById('vname').textContent=v.label;
  document.getElementById('hp-bar').style.width=(v.hp/v.maxHp*100)+'%';
  document.getElementById('hp-bar').style.background=v.hp>50?'#4CAF50':v.hp>25?'#FF9800':'#F44336';
}

// ── Auto-drive other vehicles ──────────────────────────────────────────────
let autoT=[0, 0.25, 0.5, 0.75, 0, 0, 0, 0, 0];
function autoVehicles(){
  for(let i=0;i<vehicles.length;i++){
    if(i===activeV)continue;
    const v=vehicles[i];
    if(i===4&&BREAKDOWNS.train.broken) continue;
    if(i===1&&BREAKDOWNS.tesla.broken) continue;
    if(v.onTrack){
      autoT[i]=(autoT[i]+0.0008)%1;
      const pos=getTrackPos(autoT[i]);
      v.x=pos.x;v.y=pos.y;v.angle=pos.angle;
    }
  }

  // ── AUTO-FIX: Fix Truck drives to Tesla when Tesla breaks ──
  if(BREAKDOWNS.tesla.broken && activeV!==6){
    const fixV=vehicles[6];
    const teslaV2=vehicles[1];
    const fdx=teslaV2.x-fixV.x, fdy=teslaV2.y-fixV.y;
    const fdist=Math.sqrt(fdx*fdx+fdy*fdy);
    if(fdist>80){
      // Steer fix truck toward Tesla
      const target=Math.atan2(fdy,fdx);
      let diff=target-fixV.angle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      fixV.angle+=diff*0.1;
      fixV.speed=Math.min(fixV.maxSpeed*0.8, fdist*0.04+2);
      fixV.x=Math.max(20,Math.min(W.w-20,fixV.x+Math.cos(fixV.angle)*fixV.speed));
      fixV.y=Math.max(20,Math.min(W.h-20,fixV.y+Math.sin(fixV.angle)*fixV.speed));
    } else {
      // Close enough — auto-fix!
      fixV.speed=0;
      BREAKDOWNS.tesla.fixProgress+=0.008;
      if(Math.floor(BREAKDOWNS.tesla.fixProgress*10)%4===0){
        BREAKDOWNS.tesla.smokeParticles.push({x:teslaV2.x,y:teslaV2.y,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,life:30,maxLife:30,r:6+Math.random()*6});
      }
      if(BREAKDOWNS.tesla.fixProgress>=1){
        BREAKDOWNS.tesla.broken=false;
        BREAKDOWNS.tesla.fixProgress=0;
        BREAKDOWNS.tesla.breakTimer=1200+Math.floor(Math.random()*900);
        spawnParty(teslaV2.x,teslaV2.y);
        showMsg('🔧 Fix Truck AUTO-FIXED the Tesla! ⚡ Back online!');
      } else if(BREAKDOWNS.tesla.fixProgress<0.1){
        showMsg('🔧 Fix Truck rushing to fix the Tesla! ⚡');
      }
    }
  }
}

// ── Draw terrain ───────────────────────────────────────────────────────────
function drawTerrain(){
  // Grass base
  ctx.fillStyle='#388E3C';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grass patches (darker)
  ctx.fillStyle='#2E7D32';
  for(let gx=0;gx<W.w;gx+=200){
    for(let gy=0;gy<W.h;gy+=200){
      const [sx,sy]=w2s(gx,gy);
      if(sx>-200&&sx<canvas.width+200&&sy>-200&&sy<canvas.height+200){
        ctx.beginPath();
        ctx.arc(sx+100,sy+100,60+Math.sin(gx*0.05+gy*0.03)*20,0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Roads (horizontal)
  for(const r of H_ROADS){
    const [,sy]=w2s(0,r.y);
    if(sy>-ROAD_W&&sy<canvas.height+ROAD_W){
      ctx.fillStyle='#37474F';ctx.fillRect(0,sy-ROAD_W/2,canvas.width,ROAD_W);
      // Centre line
      ctx.strokeStyle='#FFEB3B';ctx.lineWidth=2;ctx.setLineDash([28,16]);
      ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(canvas.width,sy);ctx.stroke();
      ctx.setLineDash([]);
      // Edges
      ctx.strokeStyle='#fff';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,sy-ROAD_W/2);ctx.lineTo(canvas.width,sy-ROAD_W/2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,sy+ROAD_W/2);ctx.lineTo(canvas.width,sy+ROAD_W/2);ctx.stroke();
    }
  }
  // Roads (vertical)
  for(const r of V_ROADS){
    const [sx]=w2s(r.x,0);
    if(sx>-ROAD_W&&sx<canvas.width+ROAD_W){
      ctx.fillStyle='#37474F';ctx.fillRect(sx-ROAD_W/2,0,ROAD_W,canvas.height);
      ctx.strokeStyle='#FFEB3B';ctx.lineWidth=2;ctx.setLineDash([28,16]);
      ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,canvas.height);ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle='#fff';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx-ROAD_W/2,0);ctx.lineTo(sx-ROAD_W/2,canvas.height);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+ROAD_W/2,0);ctx.lineTo(sx+ROAD_W/2,canvas.height);ctx.stroke();
    }
  }
}

// ── Draw train track ───────────────────────────────────────────────────────
function drawTrack(){
  // Track bed
  ctx.strokeStyle='#5D4037';ctx.lineWidth=26;
  ctx.beginPath();
  for(let i=0;i<=TRACK_PTS;i++){
    const pos=getTrackPos(i/TRACK_PTS);
    const [sx,sy]=w2s(pos.x,pos.y);
    if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
  }
  ctx.closePath();ctx.stroke();
  // Rails
  for(const off of[-7,7]){
    ctx.strokeStyle='#B0BEC5';ctx.lineWidth=4;
    ctx.beginPath();
    for(let i=0;i<=TRACK_PTS;i++){
      const a=i/TRACK_PTS*Math.PI*2;
      const pos=getTrackPos(i/TRACK_PTS);
      const nx=Math.cos(a+Math.PI/2)*off, ny=Math.sin(a+Math.PI/2)*off;
      const [sx,sy]=w2s(pos.x+nx,pos.y+ny);
      if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
    }
    ctx.closePath();ctx.stroke();
  }
  // Sleepers
  ctx.strokeStyle='#4E342E';ctx.lineWidth=5;
  for(let i=0;i<TRACK_PTS;i+=3){
    const pos=getTrackPos(i/TRACK_PTS);
    const [sx,sy]=w2s(pos.x,pos.y);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(pos.angle);
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,12);ctx.stroke();
    ctx.restore();
  }
}

// ── Draw build zones ───────────────────────────────────────────────────────
function drawBuildZones(){
  for(const bz of BUILD_ZONES){
    const [bx,by]=w2s(bz.x,bz.y);
    if(bx>canvas.width+100||bx<-300||by>canvas.height+100||by<-300)continue;
    if(bz.done){
      drawBuiltStructure(bz,bx,by);
    } else {
      // Ghost outline
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(bx,by,bz.w,bz.h);
      ctx.strokeStyle=bz.col;ctx.lineWidth=3;ctx.setLineDash([10,7]);
      ctx.strokeRect(bx,by,bz.w,bz.h);ctx.setLineDash([]);
      // Label
      ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
      ctx.fillText(bz.label,bx+bz.w/2,by+bz.h/2-10);
      // Requirements
      const needs=Object.entries(bz.need).map(([k,v])=>{
        const have=Math.min(inv[k]||0,v);
        const icon={wood:'🪵',brick:'🧱',steel:'⚙️',glass:'🪟',battery:'🔋'}[k];
        return icon+have+'/'+v;
      }).join(' ');
      ctx.font='11px Arial';ctx.fillText(needs,bx+bz.w/2,by+bz.h/2+8);
      // Progress bar
      const pct=totalHave(bz)/totalNeeded(bz);
      ctx.fillStyle='#333';ctx.fillRect(bx+10,by+bz.h-18,bz.w-20,10);
      ctx.fillStyle='#4CAF50';ctx.fillRect(bx+10,by+bz.h-18,(bz.w-20)*pct,10);
      // SPACE prompt
      const v=vehicles[activeV];
      const dx=v.x-(bz.x+bz.w/2),dy=v.y-(bz.y+bz.h/2);
      if(Math.sqrt(dx*dx+dy*dy)<140&&pct>=1){
        ctx.fillStyle='#FFD700';ctx.font='bold 15px Arial';
        ctx.fillText('PRESS SPACE to build!',bx+bz.w/2,by-10);
      }
    }
  }
}

function drawBuiltStructure(bz,bx,by){
  if(bz.id==='house'||bz.id==='house2'){
    // House walls
    ctx.fillStyle='#FFCC80';ctx.fillRect(bx,by+bz.h*0.3,bz.w,bz.h*0.7);
    // Roof
    ctx.fillStyle='#E53935';
    ctx.beginPath();ctx.moveTo(bx-10,by+bz.h*0.3);ctx.lineTo(bx+bz.w/2,by-10);ctx.lineTo(bx+bz.w+10,by+bz.h*0.3);ctx.closePath();ctx.fill();
    // Door
    ctx.fillStyle='#5D4037';ctx.fillRect(bx+bz.w/2-14,by+bz.h*0.55,28,bz.h*0.45);
    // Windows
    ctx.fillStyle='#B3E5FC';
    ctx.fillRect(bx+14,by+bz.h*0.38,30,22);ctx.fillRect(bx+bz.w-44,by+bz.h*0.38,30,22);
    ctx.strokeStyle='#1565C0';ctx.lineWidth=2;
    ctx.strokeRect(bx+14,by+bz.h*0.38,30,22);ctx.strokeRect(bx+bz.w-44,by+bz.h*0.38,30,22);
    // Chimney
    ctx.fillStyle='#757575';ctx.fillRect(bx+bz.w*0.7,by-20,18,bz.h*0.32);
    // Label
    ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';
    ctx.fillText(bz.label,bx+bz.w/2,by+bz.h+14);
  } else if(bz.id==='garage'){
    ctx.fillStyle='#CFD8DC';ctx.fillRect(bx,by,bz.w,bz.h);
    ctx.strokeStyle='#546E7A';ctx.lineWidth=3;ctx.strokeRect(bx,by,bz.w,bz.h);
    // Garage door
    ctx.fillStyle='#90A4AE';ctx.fillRect(bx+20,by+bz.h*0.3,bz.w-40,bz.h*0.65);
    ctx.strokeStyle='#607D8B';ctx.lineWidth=2;
    for(let row=0;row<4;row++) ctx.strokeRect(bx+20,by+bz.h*0.3+row*(bz.h*0.65/4),bz.w-40,bz.h*0.65/4);
    // Roof edge
    ctx.fillStyle='#607D8B';ctx.fillRect(bx,by,bz.w,16);
    ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText('🏗️ GARAGE',bx+bz.w/2,by+bz.h+14);
  } else if(bz.id==='workshop'){
    ctx.fillStyle='#FFF8E1';ctx.fillRect(bx,by,bz.w,bz.h);
    ctx.strokeStyle='#FF6F00';ctx.lineWidth=3;ctx.strokeRect(bx,by,bz.w,bz.h);
    ctx.fillStyle='#FF6F00';ctx.fillRect(bx,by,bz.w,18);
    ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='center';
    ctx.fillText('🔧 WORKSHOP',bx+bz.w/2,by+13);
    // Gear decorations
    ctx.font='28px Arial';ctx.fillText('⚙️',bx+bz.w/2-20,by+bz.h*0.6);
    ctx.fillText('🔩',bx+bz.w/2+20,by+bz.h*0.6);
  } else if(bz.id==='charger'){
    ctx.fillStyle='#E0F7FA';ctx.fillRect(bx,by,bz.w,bz.h);
    ctx.strokeStyle='#00BCD4';ctx.lineWidth=3;ctx.strokeRect(bx,by,bz.w,bz.h);
    // Lightning bolt
    ctx.fillStyle='#00BCD4';ctx.font='44px Arial';ctx.textAlign='center';
    ctx.fillText('⚡',bx+bz.w/2,by+bz.h*0.65);
    ctx.fillStyle='#006064';ctx.font='bold 11px Arial';
    ctx.fillText('CHARGE STATION',bx+bz.w/2,by+bz.h+14);
    // Glowing effect
    const grd=ctx.createRadialGradient(bx+bz.w/2,by+bz.h/2,10,bx+bz.w/2,by+bz.h/2,80);
    grd.addColorStop(0,'rgba(0,188,212,0.2)');grd.addColorStop(1,'rgba(0,188,212,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(bx+bz.w/2,by+bz.h/2,80,0,Math.PI*2);ctx.fill();
  } else if(bz.id==='school'){
    ctx.fillStyle='#F3E5F5';ctx.fillRect(bx,by,bz.w,bz.h);
    ctx.fillStyle='#CE93D8';ctx.fillRect(bx,by,bz.w,20);
    ctx.strokeStyle='#AB47BC';ctx.lineWidth=2;ctx.strokeRect(bx,by,bz.w,bz.h);
    ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';
    ctx.fillText('🏫 SCHOOL',bx+bz.w/2,by+15);
    ctx.font='24px Arial';ctx.fillText('📚',bx+bz.w/2-24,by+bz.h*0.62);
    ctx.fillText('✏️',bx+bz.w/2+20,by+bz.h*0.62);
    for(let i=0;i<3;i++) ctx.fillRect(bx+15+i*40,by+30,25,18);
  } else if(bz.id==='station'){
    ctx.fillStyle='#ECEFF1';ctx.fillRect(bx,by,bz.w,bz.h);
    ctx.fillStyle='#546E7A';ctx.fillRect(bx,by,bz.w,22);
    ctx.strokeStyle='#607D8B';ctx.lineWidth=2;ctx.strokeRect(bx,by,bz.w,bz.h);
    ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';
    ctx.fillText('🚉 TRAIN STATION',bx+bz.w/2,by+16);
    ctx.font='26px Arial';ctx.fillText('🚂',bx+bz.w/2,by+bz.h*0.62);
    // Clock
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx+bz.w/2,by+bz.h*0.3,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#546E7A';ctx.lineWidth=2;ctx.stroke();
    const now=new Date();
    const hr=now.getHours()%12/12*Math.PI*2-Math.PI/2;
    const mn=now.getMinutes()/60*Math.PI*2-Math.PI/2;
    ctx.strokeStyle='#000';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx+bz.w/2,by+bz.h*0.3);ctx.lineTo(bx+bz.w/2+Math.cos(hr)*10,by+bz.h*0.3+Math.sin(hr)*10);ctx.stroke();
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx+bz.w/2,by+bz.h*0.3);ctx.lineTo(bx+bz.w/2+Math.cos(mn)*15,by+bz.h*0.3+Math.sin(mn)*15);ctx.stroke();
  }
}

// ── Draw items ─────────────────────────────────────────────────────────────
function drawItems(){
  for(const it of items){
    if(!it.alive)continue;
    const [ix,iy]=w2s(it.x,it.y);
    if(ix<-30||ix>canvas.width+30||iy<-30||iy>canvas.height+30)continue;
    const bob=Math.sin(it.bob)*4;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(ix,iy+it.r+bob+4,it.r*0.9,4,0,0,Math.PI*2);ctx.fill();
    // Glow
    ctx.fillStyle=it.col+'44';ctx.beginPath();ctx.arc(ix,iy+bob,it.r+6,0,Math.PI*2);ctx.fill();
    // Icon
    ctx.font=(it.r*1.6)+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.icon,ix,iy+bob);
    ctx.textBaseline='alphabetic';
  }
}

// ── Draw vehicles ──────────────────────────────────────────────────────────
function drawVehicle(v,active){
  const [px,py]=w2s(v.x,v.y);
  ctx.save();ctx.translate(px,py);ctx.rotate(v.angle+Math.PI/2);

  const spd=Math.abs(v.speed/v.maxSpeed);
  const flk=Math.sin(Date.now()*0.05)*0.12+0.88;

  if(v.type==='monster'||v.type==='monster2'){
    // ── MONSTER TRUCK — BIG & MEAN ──
    // Dirt/dust clouds when moving fast
    if(spd>0.3&&active){
      const dc=Date.now()*0.02;
      for(const[wx,wy]of[[-v.w/2,v.h/3],[v.w/2,v.h/3]]){
        ctx.globalAlpha=0.35*spd;
        ctx.fillStyle='#8D6E63';
        ctx.beginPath();ctx.arc(wx+(Math.sin(dc+wx)*8),wy+22,14*spd,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(wx+(Math.cos(dc+wx)*6),wy+32,10*spd,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    // Exhaust smoke from back
    if(spd>0.1){
      const fl=spd*30*flk;
      const eg=ctx.createLinearGradient(0,v.h/2,0,v.h/2+fl);
      eg.addColorStop(0,'rgba(80,80,80,0.7)');eg.addColorStop(1,'rgba(80,80,80,0)');
      ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(-8,v.h/2+fl/2,8,fl/2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(8,v.h/2+fl/2,8,fl/2,0,0,Math.PI*2);ctx.fill();
    }
    // HUGE wheels (4 massive ones)
    const wheelR=28;
    for(const[wx,wy]of[[-v.w/2+6,-v.h/3+4],[v.w/2-6,-v.h/3+4],[-v.w/2+6,v.h/3-4],[v.w/2-6,v.h/3-4]]){
      // Outer tyre
      ctx.fillStyle='#1A1A1A';ctx.beginPath();ctx.arc(wx,wy,wheelR,0,Math.PI*2);ctx.fill();
      // Tyre tread (chunky)
      ctx.strokeStyle='#333';ctx.lineWidth=4;
      for(let t=0;t<8;t++){
        const ta=t/8*Math.PI*2+Date.now()*0.004*Math.sign(v.speed);
        ctx.beginPath();ctx.moveTo(wx+Math.cos(ta)*(wheelR-8),wy+Math.sin(ta)*(wheelR-8));
        ctx.lineTo(wx+Math.cos(ta)*wheelR,wy+Math.sin(ta)*wheelR);ctx.stroke();
      }
      // Rim
      ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.arc(wx,wy,wheelR-10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#E0E0E0';
      for(let s=0;s<5;s++){
        const sa=s/5*Math.PI*2+Date.now()*0.002*Math.sign(v.speed);
        ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+Math.cos(sa)*(wheelR-12),wy+Math.sin(sa)*(wheelR-12));ctx.lineWidth=3;ctx.strokeStyle='#BDBDBD';ctx.stroke();
      }
      ctx.fillStyle='#757575';ctx.beginPath();ctx.arc(wx,wy,6,0,Math.PI*2);ctx.fill();
    }
    // High suspension arms
    ctx.fillStyle='#616161';ctx.lineWidth=5;ctx.strokeStyle='#424242';
    for(const[wx,wy]of[[-v.w/2+6,-v.h/3+4],[v.w/2-6,-v.h/3+4],[-v.w/2+6,v.h/3-4],[v.w/2-6,v.h/3-4]]){
      ctx.fillRect(wx-6,wy-5,12,10);
    }
    // BODY — chunky and lifted high
    ctx.fillStyle=v.col;
    ctx.beginPath();
    ctx.moveTo(-v.w/2+10,-v.h/2+4);ctx.lineTo(v.w/2-10,-v.h/2+4);
    ctx.lineTo(v.w/2+4,v.h/2-8);ctx.lineTo(-v.w/2-4,v.h/2-8);ctx.closePath();ctx.fill();
    ctx.strokeStyle=v.trim;ctx.lineWidth=4;ctx.stroke();
    // Armour side panels
    ctx.fillStyle='#B71C1C';
    ctx.fillRect(-v.w/2-2,-v.h/4,8,v.h/2);
    ctx.fillRect(v.w/2-6,-v.h/4,8,v.h/2);
    // Windshield (big, tinted)
    ctx.fillStyle='rgba(100,180,255,0.5)';
    ctx.beginPath();ctx.moveTo(-v.w/2+14,-v.h/2+4);ctx.lineTo(v.w/2-14,-v.h/2+4);
    ctx.lineTo(v.w/2-8,-v.h/2+24);ctx.lineTo(-v.w/2+8,-v.h/2+24);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
    // Bull bar (front)
    ctx.fillStyle='#424242';ctx.fillRect(-v.w/2+4,-v.h/2+2,v.w-8,8);
    ctx.strokeStyle='#757575';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-v.w/2+4,-v.h/2+6);ctx.lineTo(v.w/2-4,-v.h/2+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-v.w/3,-v.h/2+2);ctx.lineTo(-v.w/3,-v.h/2-6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(v.w/3,-v.h/2+2);ctx.lineTo(v.w/3,-v.h/2-6);ctx.stroke();
    // Big headlights
    ctx.fillStyle=spd>0.05?'#FFFF88':'#FFD700';
    ctx.beginPath();ctx.ellipse(-v.w/2+14,-v.h/2+6,9,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(v.w/2-14,-v.h/2+6,9,6,0,0,Math.PI*2);ctx.fill();
    if(spd>0.05){
      ctx.globalAlpha=0.25*spd;ctx.fillStyle='#FFFF00';
      ctx.beginPath();ctx.ellipse(-v.w/2+14,-v.h/2-18,14,30,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(v.w/2-14,-v.h/2-18,14,30,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    // Flame decals on side
    const ft2=Date.now()*0.005;
    ctx.fillStyle=`hsl(${20+Math.sin(ft2)*10},100%,50%)`;
    ctx.font='18px Arial';ctx.textAlign='center';
    ctx.fillText('🔥',0,v.h/2-14);
    // Speed effect — red glow when going fast
    if(spd>0.7&&active){
      ctx.strokeStyle=`rgba(255,50,0,${(spd-0.7)*1.5})`;ctx.lineWidth=6;
      ctx.beginPath();ctx.ellipse(0,0,v.w/2+8,v.h/2+8,0,0,Math.PI*2);ctx.stroke();
    }
    // Label
    if(active){
      ctx.fillStyle='#FFD700';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('MONSTER TRUCK',0,v.h/2+18);
    }

  } else if(v.type==='tesla'){
    // Exhaust/thrust
    if(spd>0.1){
      const fl=spd*22*flk;
      const eg=ctx.createLinearGradient(0,v.h/3,0,v.h/3+fl);
      eg.addColorStop(0,'rgba(0,188,212,0.8)');eg.addColorStop(1,'rgba(0,188,212,0)');
      ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(0,v.h/3+fl/2,10,fl/2,0,0,Math.PI*2);ctx.fill();
    }
    // Wheels
    const wheelR2=18;
    for(const[wx,wy]of[[-v.w/2+4,-v.h/3],[v.w/2-4,-v.h/3],[-v.w/2+4,v.h/3],[v.w/2-4,v.h/3]]){
      ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(wx,wy,wheelR2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#424242';ctx.beginPath();ctx.arc(wx,wy,wheelR2-4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.arc(wx,wy,5,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#757575';
    ctx.fillRect(-v.w/2+4,-v.h/3-3,12,6);ctx.fillRect(v.w/2-16,-v.h/3-3,12,6);
    ctx.fillRect(-v.w/2+4,v.h/3-3,12,6);ctx.fillRect(v.w/2-16,v.h/3-3,12,6);
    ctx.fillStyle=v.col;
    ctx.beginPath();ctx.moveTo(-v.w/2+8,-v.h/2);ctx.lineTo(v.w/2-8,-v.h/2);
    ctx.lineTo(v.w/2+2,v.h/2);ctx.lineTo(-v.w/2-2,v.h/2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=v.trim;ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.ellipse(0,-v.h/4,v.w/3,v.h/5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle=`rgba(0,188,212,${0.4+spd*0.4})`;ctx.lineWidth=4;
    ctx.beginPath();ctx.ellipse(0,0,v.w/2+4,v.h/2+4,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#212121';ctx.fillRect(-18,v.h/2-8,36,7);
    ctx.fillStyle=v.charge>30?'#00BCD4':'#F44336';
    ctx.fillRect(-18,v.h/2-8,36*(v.charge/100),7);
    ctx.fillStyle=v.trim;ctx.fillRect(-v.w/4,-v.h/2,v.w/2,8);
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.ellipse(-v.w/3,-v.h/2+2,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(v.w/3,-v.h/2+2,6,4,0,0,Math.PI*2);ctx.fill();

  } else if(v.type==='car'){
    // Thrust
    if(spd>0.1){
      const fl=spd*18*flk;
      const eg=ctx.createLinearGradient(0,v.h/3,0,v.h/3+fl);
      eg.addColorStop(0,'rgba(180,180,255,0.7)');eg.addColorStop(1,'rgba(100,100,255,0)');
      ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(0,v.h/3+fl/2,7,fl/2,0,0,Math.PI*2);ctx.fill();
    }
    // Small wheels
    for(const[wx,wy]of[[-v.w/2+2,-v.h/3],[v.w/2-2,-v.h/3],[-v.w/2+2,v.h/3],[v.w/2-2,v.h/3]]){
      ctx.fillStyle='#212121';ctx.beginPath();ctx.ellipse(wx,wy,10,12,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.arc(wx,wy,4,0,Math.PI*2);ctx.fill();
    }
    // Body - sporty shape
    ctx.fillStyle=v.col;
    ctx.beginPath();ctx.moveTo(-v.w/2,-v.h/4);ctx.lineTo(-v.w/3,-v.h/2);ctx.lineTo(v.w/3,-v.h/2);ctx.lineTo(v.w/2,-v.h/4);ctx.lineTo(v.w/2,v.h/2);ctx.lineTo(-v.w/2,v.h/2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=v.trim;ctx.lineWidth=2;ctx.stroke();
    // Windshield
    ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.moveTo(-v.w/3,-v.h/2+2);ctx.lineTo(v.w/3,-v.h/2+2);ctx.lineTo(v.w/2-2,-v.h/4+2);ctx.lineTo(-v.w/2+2,-v.h/4+2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.ellipse(-v.w/3,-v.h/2+2,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(v.w/3,-v.h/2+2,5,4,0,0,Math.PI*2);ctx.fill();

  } else if(v.type==='crane'){
    // Wheels
    for(const[wx,wy]of[[-v.w/2+2,-v.h/3],[v.w/2-2,-v.h/3],[-v.w/2+2,v.h/4],[v.w/2-2,v.h/4],[-v.w/2+2,v.h/2-4],[v.w/2-2,v.h/2-4]]){
      ctx.fillStyle='#212121';ctx.beginPath();ctx.ellipse(wx,wy,11,13,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#616161';ctx.beginPath();ctx.arc(wx,wy,5,0,Math.PI*2);ctx.fill();
    }
    // Truck body
    ctx.fillStyle=v.col;ctx.fillRect(-v.w/2,-v.h/2,v.w,v.h*0.75);
    ctx.strokeStyle=v.trim;ctx.lineWidth=2;ctx.strokeRect(-v.w/2,-v.h/2,v.w,v.h*0.75);
    // Cab
    ctx.fillStyle='#FFA000';ctx.fillRect(-v.w/2,-v.h/2,v.w,v.h*0.35);
    ctx.fillStyle='#B3E5FC';ctx.fillRect(-v.w/2+4,-v.h/2+4,v.w-8,v.h*0.2);
    // CRANE ARM
    ctx.save();ctx.translate(0,-v.h/2+8);ctx.rotate((v.craneArm-90)*Math.PI/180);
    ctx.fillStyle='#FF8F00';ctx.fillRect(-4,-70,8,70);
    ctx.fillStyle='#FF6F00';ctx.fillRect(-3,-90,6,22);
    // Hook
    ctx.strokeStyle='#424242';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-90);ctx.lineTo(0,-110);ctx.stroke();
    ctx.beginPath();ctx.arc(0,-115,5,0,Math.PI*1.5);ctx.stroke();
    ctx.restore();
    // Controls hint
    if(active){ctx.fillStyle='rgba(255,255,0,0.7)';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('Q/E=Arm',0,v.h/2+12);}

  } else if(v.type==='train'){
    // Engine car only drawn here (ctx is already translated+rotated to engine pos)
    // Draw engine cab
    ctx.fillStyle='#1565C0';ctx.fillRect(-20,-12,40,24);
    ctx.strokeStyle='#0D47A1';ctx.lineWidth=1.5;ctx.strokeRect(-20,-12,40,24);
    ctx.fillStyle='#B3E5FC';ctx.fillRect(4,-10,14,14);
    // Pantograph
    ctx.strokeStyle='#90A4AE';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-6,-12);ctx.lineTo(-2,-24);ctx.lineTo(2,-24);ctx.lineTo(6,-12);ctx.stroke();
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(-8,-24);ctx.lineTo(8,-24);ctx.stroke();
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(-14,12,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(14,12,5,0,Math.PI*2);ctx.fill();
    // Electric sparks
    if(Math.random()<0.3){
      parts.push({x:v.x+(Math.random()-0.5)*20,y:v.y-22,
        vx:(Math.random()-0.5)*2,vy:-1.5,life:10,maxLife:10,r:2,col:'#FFD700'});
    }

  } else if(v.type==='excavator'){
    // Tracks (two caterpillar belts)
    for(const side of[-1,1]){
      const tx=side*(v.w/2-8);
      ctx.fillStyle='#212121';ctx.fillRect(tx-10,-v.h/2+4,20,v.h-8);
      ctx.strokeStyle='#424242';ctx.lineWidth=2;ctx.strokeRect(tx-10,-v.h/2+4,20,v.h-8);
      // Track links
      ctx.strokeStyle='#616161';ctx.lineWidth=1.5;
      for(let t=0;t<6;t++) ctx.strokeRect(tx-10,-v.h/2+4+t*(v.h-8)/6,20,(v.h-8)/6);
      // Drive sprockets
      ctx.fillStyle='#757575';ctx.beginPath();ctx.arc(tx,-v.h/2+8,9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#757575';ctx.beginPath();ctx.arc(tx,v.h/2-8,9,0,Math.PI*2);ctx.fill();
    }
    // Body cab
    ctx.fillStyle=v.col;ctx.fillRect(-v.w/2+12,-v.h/2,v.w-24,v.h*0.55);
    ctx.strokeStyle=v.trim;ctx.lineWidth=2;ctx.strokeRect(-v.w/2+12,-v.h/2,v.w-24,v.h*0.55);
    // Cab roof
    ctx.fillStyle='#FFA000';ctx.fillRect(-v.w/2+14,-v.h/2,v.w-28,14);
    // Cab windows
    ctx.fillStyle='#B3E5FC';ctx.fillRect(-v.w/2+16,-v.h/2+16,v.w-32,v.h*0.22);
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(-v.w/2+16,-v.h/2+16,v.w-32,v.h*0.22);
    // Exhaust pipe
    ctx.fillStyle='#424242';ctx.fillRect(v.w/2-20,-v.h/2-14,8,18);
    if(v.speed>0.5&&Math.random()<0.4){
      parts.push({x:v.x+Math.cos(v.angle-Math.PI/2)*18,y:v.y+Math.sin(v.angle-Math.PI/2)*18,
        vx:(Math.random()-0.5),vy:-1,life:35,maxLife:35,r:8,col:'#9E9E9E'});
    }
    // BOOM ARM (main arm from top of cab)
    ctx.save();ctx.translate(0,-v.h/2+5);ctx.rotate((v.bucketArm-45)*Math.PI/180);
    // Main boom
    ctx.fillStyle='#FF6F00';ctx.fillRect(-5,-75,10,75);
    ctx.strokeStyle='#E65100';ctx.lineWidth=1.5;ctx.strokeRect(-5,-75,10,75);
    // Stick arm from end of boom
    ctx.save();ctx.translate(0,-75);ctx.rotate((v.bucketAngle-90)*Math.PI/180);
    ctx.fillStyle='#FF8F00';ctx.fillRect(-4,-52,8,52);
    ctx.strokeStyle='#E65100';ctx.lineWidth=1.5;ctx.strokeRect(-4,-52,8,52);
    // BUCKET at end of stick
    ctx.save();ctx.translate(0,-52);
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.lineTo(18,22);ctx.lineTo(-18,22);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#616161';ctx.lineWidth=2;ctx.stroke();
    // Bucket teeth
    ctx.fillStyle='#9E9E9E';
    for(let t=-2;t<=2;t++) {ctx.beginPath();ctx.moveTo(t*6,22);ctx.lineTo(t*6-3,30);ctx.lineTo(t*6+3,30);ctx.closePath();ctx.fill();}
    ctx.restore();ctx.restore();ctx.restore();
    // Hint
    if(active){
      ctx.fillStyle='rgba(255,255,0,0.75)';ctx.font='10px Arial';ctx.textAlign='center';
      ctx.fillText('Q/E=Boom  Z/X=Bucket',0,v.h/2+13);
    }

  } else if(v.type==='fixtruck'){
    const spd=Math.abs(v.speed/v.maxSpeed);
    // Exhaust
    if(spd>0.1){
      const fl=spd*16;
      const eg=ctx.createLinearGradient(0,v.h/3,0,v.h/3+fl);
      eg.addColorStop(0,'rgba(150,200,100,0.7)');eg.addColorStop(1,'rgba(100,180,50,0)');
      ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(0,v.h/3+fl/2,8,fl/2,0,0,Math.PI*2);ctx.fill();
    }
    // Wheels (4 standard wheels)
    for(const[wx,wy]of[[-v.w/2+6,-v.h/3],[v.w/2-6,-v.h/3],[-v.w/2+6,v.h/3],[v.w/2-6,v.h/3]]){
      ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(wx,wy,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#757575';ctx.beginPath();ctx.arc(wx,wy,5,0,Math.PI*2);ctx.fill();
    }
    // Truck body — green
    ctx.fillStyle=v.col;
    ctx.beginPath();ctx.moveTo(-v.w/2,-v.h/2);ctx.lineTo(v.w/2,-v.h/2);ctx.lineTo(v.w/2,v.h/2);ctx.lineTo(-v.w/2,v.h/2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=v.trim;ctx.lineWidth=3;ctx.stroke();
    // Cab (top half)
    ctx.fillStyle='#388E3C';ctx.fillRect(-v.w/2,-v.h/2,v.w,v.h*0.42);
    ctx.strokeStyle='#2E7D32';ctx.lineWidth=1.5;ctx.strokeRect(-v.w/2,-v.h/2,v.w,v.h*0.42);
    // Windshield
    ctx.fillStyle='#B3E5FC';ctx.fillRect(-v.w/2+5,-v.h/2+4,v.w-10,v.h*0.24);
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(-v.w/2+5,-v.h/2+4,v.w-10,v.h*0.24);
    // Yellow stripe
    ctx.fillStyle='#FFEB3B';ctx.fillRect(-v.w/2,v.h*0.42-v.h/2-2,v.w,6);
    // Equipment bay (back half) — battery charger unit
    ctx.fillStyle='#1B5E20';ctx.fillRect(-v.w/2+2,v.h*0.42-v.h/2+4,v.w-4,v.h*0.52);
    // Big battery pack on back
    ctx.fillStyle='#212121';ctx.fillRect(-v.w/2+8,v.h*0.42-v.h/2+8,v.w-16,v.h*0.36);
    ctx.fillStyle='#00BCD4';ctx.fillRect(-v.w/2+10,v.h*0.42-v.h/2+10,v.w-20,v.h*0.28);
    // Battery charge bars
    ctx.fillStyle='#00E5FF';
    for(let i=0;i<4;i++) ctx.fillRect(-v.w/2+12+i*10,v.h*0.42-v.h/2+12,7,v.h*0.18*(0.6+i*0.1));
    // Charging cable coil on side
    ctx.strokeStyle='#FFEB3B';ctx.lineWidth=3;
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const cy=v.h*0.42-v.h/2+14+i*5;
      ctx.arc(v.w/2-6,cy,4,0,Math.PI*(i%2===0?1:-1),i%2!==0);
    }
    ctx.stroke();
    // ⚡ symbol on side
    ctx.fillStyle='#FFEB3B';ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText('⚡',0,v.h/2-10);
    // FIX label on roof
    ctx.fillStyle='#fff';ctx.font='bold 9px Arial';ctx.textAlign='center';
    ctx.fillText('FIX TRUCK',0,-v.h/2+30);
    // Flashing light on roof when near broken vehicle
    const trainBroken=BREAKDOWNS.train.broken, teslaBroken=BREAKDOWNS.tesla.broken;
    if(trainBroken||teslaBroken){
      const flash=Math.sin(Date.now()*0.015)>0;
      ctx.fillStyle=flash?'#FF5722':'#FFEB3B';
      ctx.beginPath();ctx.arc(0,-v.h/2-8,8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#212121';ctx.lineWidth=1.5;ctx.stroke();
    } else {
      ctx.fillStyle='#FF5722';ctx.beginPath();ctx.arc(0,-v.h/2-8,8,0,Math.PI*2);ctx.fill();
    }
    if(active){
      ctx.fillStyle='rgba(255,255,0,0.8)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('SPACE = Fix & Charge!',0,v.h/2+14);
    }

  } else if(v.type==='firetruck'){
    const spd=Math.abs(v.speed/v.maxSpeed);
    // Exhaust
    if(spd>0.1){
      const fl=spd*18;
      ctx.fillStyle='rgba(180,180,180,0.5)';
      ctx.beginPath();ctx.ellipse(0,v.h/3+fl/2,7,fl/2,0,0,Math.PI*2);ctx.fill();
    }
    // Big wheels
    for(const[wx,wy]of[[-v.w/2+5,-v.h/3],[v.w/2-5,-v.h/3],[-v.w/2+5,v.h/3],[v.w/2-5,v.h/3]]){
      ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(wx,wy,13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#757575';ctx.beginPath();ctx.arc(wx,wy,6,0,Math.PI*2);ctx.fill();
    }
    // Truck body
    ctx.fillStyle=v.col;
    ctx.fillRect(-v.w/2,-v.h/2,v.w,v.h);
    ctx.strokeStyle=v.trim;ctx.lineWidth=3;ctx.strokeRect(-v.w/2,-v.h/2,v.w,v.h);
    // Cab top
    ctx.fillStyle='#B71C1C';ctx.fillRect(-v.w/2,-v.h/2,v.w,v.h*0.38);
    ctx.strokeStyle='#7F0000';ctx.lineWidth=1.5;ctx.strokeRect(-v.w/2,-v.h/2,v.w,v.h*0.38);
    // Windshield
    ctx.fillStyle='#B3E5FC';ctx.fillRect(-v.w/2+5,-v.h/2+4,v.w-10,v.h*0.22);
    // White stripe
    ctx.fillStyle='#fff';ctx.fillRect(-v.w/2,v.h*0.38-v.h/2-2,v.w,5);
    // Water tank
    ctx.fillStyle='#CFD8DC';ctx.fillRect(-v.w/2+4,v.h*0.38-v.h/2+4,v.w-8,v.h*0.5);
    ctx.strokeStyle='#90A4AE';ctx.lineWidth=2;ctx.strokeRect(-v.w/2+4,v.h*0.38-v.h/2+4,v.w-8,v.h*0.5);
    // Tank label
    ctx.fillStyle='#1565C0';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText('💧WATER',0,v.h*0.38-v.h/2+v.h*0.3);
    // Hose reel on side
    ctx.strokeStyle='#1565C0';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(v.w/2-8,0,8,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#1565C0';ctx.beginPath();ctx.arc(v.w/2-8,0,4,0,Math.PI*2);ctx.fill();
    // Ladders on top
    ctx.strokeStyle='#B0BEC5';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-v.w/2+6,-v.h/2-2);ctx.lineTo(v.w/2-6,-v.h/2-2);ctx.stroke();
    ctx.strokeStyle='#9E9E9E';ctx.lineWidth=1.5;
    for(let r=0;r<5;r++) ctx.strokeRect(-v.w/2+6+r*7,-v.h/2-8,5,8);
    // Siren lights
    const sirenOn=Math.sin(Date.now()*0.02)>0;
    ctx.fillStyle=sirenOn?'#F44336':'#1565C0';ctx.beginPath();ctx.arc(-10,-v.h/2-8,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=sirenOn?'#1565C0':'#F44336';ctx.beginPath();ctx.arc(10,-v.h/2-8,7,0,Math.PI*2);ctx.fill();
    // Water spray animation when pressing Q near fire
    if(active){
      ctx.fillStyle='rgba(255,255,0,0.85)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('Q = Spray Water! 💧',0,v.h/2+14);
    }
  }

  // Active ring + YOU label
  if(active){
    const pulse=0.55+Math.sin(Date.now()*0.007)*0.45;
    ctx.strokeStyle=`rgba(255,255,0,${pulse})`;ctx.lineWidth=2.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.arc(0,0,v.w*0.78,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=`rgba(255,255,0,${pulse})`;ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText('▼ YOU',0,-v.w-8);
  }
  ctx.restore();
}

// ── Draw train carriages at correct track positions ────────────────────────
function drawTrainCars(){
  // The active train vehicle index is 4, trainT is its track position
  // Carriages trail behind, each offset by a fixed track fraction
  const carSpacing=0.028; // gap between each carriage on the oval
  const trainV=vehicles[4];
  const tBase=activeV===4?trainT:autoT[4]; // use correct track position

  for(let c=1;c<=3;c++){
    const ct=((tBase - c*carSpacing)+2)%1;
    const pos=getTrackPos(ct);
    const [sx,sy]=w2s(pos.x,pos.y);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(pos.angle);
    // Carriage body
    const cols=['#E3F2FD','#BBDEFB','#90CAF9'];
    ctx.fillStyle=cols[c-1];ctx.fillRect(-20,-12,40,24);
    ctx.strokeStyle='#1565C0';ctx.lineWidth=1.5;ctx.strokeRect(-20,-12,40,24);
    // Windows
    ctx.fillStyle='#B3E5FC';
    for(let w=0;w<3;w++) ctx.fillRect(-16+w*12,-9,9,12);
    // Wheels
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(-14,12,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(14,12,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#9E9E9E';
    ctx.beginPath();ctx.arc(-14,12,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(14,12,2.5,0,Math.PI*2);ctx.fill();
    // Connector bar to next car
    ctx.strokeStyle='#555';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(26,0);ctx.stroke();
    ctx.restore();
  }
}

// ── Draw particles ─────────────────────────────────────────────────────────
function drawParts(){
  for(const p of parts){
    const [px,py]=w2s(p.x,p.y);
    const t=p.life/p.maxLife;
    ctx.globalAlpha=t;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(px,py,p.r*t,0,Math.PI*2);ctx.fill();

  ctx.globalAlpha=1;
}

// ── World minimap ──────────────────────────────────────────────────────────
function drawMinimap(){
  const mw=140,mh=100,mx=canvas.width-150,my=canvas.height-115;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.strokeRect(mx,my,mw,mh);
  const sx=mw/W.w,sy=mh/W.h;
  // Track oval
  ctx.strokeStyle='#5D4037';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=60;i++){
    const pos=getTrackPos(i/60);
    const px=mx+pos.x*sx,py=my+pos.y*sy;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.closePath();ctx.stroke();
  // Build zones
  for(const bz of BUILD_ZONES){
    ctx.fillStyle=bz.done?'#4CAF50':'#FF9800';
    ctx.fillRect(mx+bz.x*sx,my+bz.y*sy,bz.w*sx+2,bz.h*sy+2);
  }
  // Items
  ctx.fillStyle='#FFD700';
  for(const it of items){
    if(!it.alive)continue;
    ctx.beginPath();ctx.arc(mx+it.x*sx,my+it.y*sy,2,0,Math.PI*2);ctx.fill();
  }
  // Vehicles
  for(let i=0;i<vehicles.length;i++){
    const v=vehicles[i];
    const vx=mx+v.x*sx,vy=my+v.y*sy;
    ctx.fillStyle=i===activeV?'#FF5722':'#fff';
    ctx.beginPath();ctx.arc(vx,vy,i===activeV?4:2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#fff';ctx.font='9px Arial';ctx.textAlign='left';
  ctx.fillText('MAP',mx+3,my+10);
}

// ── MONSTERS & TRAPS ────────────────────────────────────────────────────────
const MONSTER_TYPES=[
  {icon:'👾',col:'#7B1FA2',spd:1.2,r:22,pts:50},
  {icon:'🦖',col:'#388E3C',spd:0.9,r:26,pts:80},
  {icon:'🐊',col:'#1B5E20',spd:1.5,r:20,pts:60},
  {icon:'👹',col:'#C62828',spd:1.0,r:24,pts:70},
  {icon:'🦕',col:'#F57F17',spd:0.7,r:28,pts:90},
  {icon:'🤖',col:'#37474F',spd:1.8,r:18,pts:40},
];
const TRAP_POSITIONS=[
  {x:900, y:700},{x:1800,y:500},{x:2500,y:900},
  {x:700, y:2000},{x:2200,y:2000},{x:1400,y:2600},
  {x:3000,y:2400},{x:400, y:2600}
];
const traps=TRAP_POSITIONS.map(p=>({...p,triggered:false,monster:null,trapT:0}));
const monsters=[];

function spawnMonsters(){
  const spawns=[
    {x:350,y:300},{x:2900,y:300},{x:200,y:2700},{x:3200,y:2700},
    {x:1600,y:500},{x:1600,y:2400},{x:800,y:1600},{x:2700,y:1600},
    {x:1100,y:1000},{x:2100,y:1000},
  ];
  for(const s of spawns){
    const mt=MONSTER_TYPES[Math.floor(Math.random()*MONSTER_TYPES.length)];
    monsters.push({
      ...mt,
      x:s.x+(Math.random()-0.5)*100,y:s.y+(Math.random()-0.5)*100,
      vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,
      alive:true,caught:false,
      dirTimer:60+Math.random()*120,
      bob:Math.random()*Math.PI*2,
      scared:false,scaredTimer:0,
    });
  }
}

function updateMonsters(){
  const v=vehicles[activeV];
  const isMonsterTruck=v.type==='monster'||v.type==='monster2';

  for(const m of monsters){
    if(!m.alive)continue;
    if(m.caught)continue;

    m.bob+=0.07;
    m.dirTimer--;

    // Get scared by monster truck
    const mdx=m.x-v.x, mdy=m.y-v.y;
    const mdist=Math.sqrt(mdx*mdx+mdy*mdy);
    if(isMonsterTruck&&mdist<500){
      m.scared=true;m.scaredTimer=120;
      // Panic — run away FAST!
      const ang=Math.atan2(mdy,mdx);
      m.vx=Math.cos(ang)*m.spd*4;
      m.vy=Math.sin(ang)*m.spd*4;
    }
    if(m.scaredTimer>0)m.scaredTimer--;else m.scared=false;

    // Random direction change
    if(m.dirTimer<=0){
      const ang=Math.random()*Math.PI*2;
      m.vx=Math.cos(ang)*m.spd*(m.scared?2:1);
      m.vy=Math.sin(ang)*m.spd*(m.scared?2:1);
      m.dirTimer=60+Math.random()*120;
    }

    m.x+=m.vx;m.y+=m.vy;
    m.x=Math.max(100,Math.min(W.w-100,m.x));
    m.y=Math.max(100,Math.min(W.h-100,m.y));
    if(m.x<=100||m.x>=W.w-100)m.vx*=-1;
    if(m.y<=100||m.y>=W.h-100)m.vy*=-1;

    // Monster truck SQUASH!
    if(isMonsterTruck&&mdist<100){
      m.alive=false;
      spawnParty(m.x,m.y);spawnParty(m.x+30,m.y-20);spawnParty(m.x-30,m.y+20);
      score+=m.pts;updateScoreUI();
      showMsg('💥💥 MONSTER TRUCK CRUSH! +'+m.pts+' pts! 🚛🔥 YEAH!');
      setTimeout(()=>{
        m.x=200+Math.random()*(W.w-400);
        m.y=200+Math.random()*(W.h-400);
        m.alive=true;m.caught=false;
        m.vx=(Math.random()-0.5)*2;m.vy=(Math.random()-0.5)*2;
      },5000);
      continue;
    }

    // Check traps
    for(const tr of traps){
      if(tr.triggered)continue;
      const tdx=m.x-tr.x,tdy=m.y-tr.y;
      if(Math.sqrt(tdx*tdx+tdy*tdy)<40){
        tr.triggered=true;tr.monster=m;tr.trapT=0;
        m.caught=true;m.vx=0;m.vy=0;
        m.x=tr.x;m.y=tr.y;
        score+=m.pts*2;updateScoreUI();
        showMsg('🪤 MONSTER TRAPPED! +'+m.pts*2+' pts!<br>Drive Monster Truck (key 1) to crush it! 🚛');
        break;
      }
    }
  }

  // Trapped monster — monster truck frees/crushes them
  for(const tr of traps){
    if(!tr.triggered)continue;
    tr.trapT++;
    const tdx=v.x-tr.x,tdy=v.y-tr.y;
    if(isMonsterTruck&&Math.sqrt(tdx*tdx+tdy*tdy)<80){
      spawnParty(tr.x,tr.y);
      score+=100;updateScoreUI();
      showMsg('🚛💥 MONSTER TRUCK CRUSHES THE TRAP! +100 pts! YEAH!');
      tr.monster.alive=false;
      setTimeout(()=>{
        if(tr.monster){
          tr.monster.x=200+Math.random()*(W.w-400);
          tr.monster.y=200+Math.random()*(W.h-400);
          tr.monster.alive=true;tr.monster.caught=false;
          tr.monster.vx=(Math.random()-0.5)*2;tr.monster.vy=(Math.random()-0.5)*2;
        }
        tr.triggered=false;tr.monster=null;
      },4000);
    }
    // Auto release after 30 seconds
    if(tr.trapT>1800){
      tr.triggered=false;
      if(tr.monster){tr.monster.caught=false;tr.monster.vx=(Math.random()-0.5)*2;tr.monster.vy=(Math.random()-0.5)*2;}
      tr.monster=null;
    }
  }
}

function drawTraps(){
  for(const tr of traps){
    const [tx,ty]=w2s(tr.x,tr.y);
    ctx.save();ctx.translate(tx,ty);
    if(tr.triggered){
      // Closed trap — cage bars
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-30,-30,60,60);
      ctx.strokeStyle='#FF8F00';ctx.lineWidth=3;
      for(let b=-24;b<=24;b+=12){
        ctx.beginPath();ctx.moveTo(b,-28);ctx.lineTo(b,28);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-28,b);ctx.lineTo(28,b);ctx.stroke();
      }
      ctx.strokeStyle='#FF6F00';ctx.lineWidth=4;ctx.strokeRect(-30,-30,60,60);
      // Monster inside
      if(tr.monster){
        ctx.font='20px Arial';ctx.textAlign='center';
        ctx.fillText(tr.monster.icon,0,7);
      }
      ctx.fillStyle='#FF5722';ctx.font='bold 9px Arial';ctx.textAlign='center';
      ctx.fillText('TRAPPED!',0,40);
      ctx.fillStyle='#FFD700';ctx.font='9px Arial';
      ctx.fillText('Drive 🚛 here!',0,52);
    } else {
      // Open trap — flat on ground with spring
      const pulse=0.7+0.3*Math.sin(Date.now()*0.004+tr.x);
      ctx.globalAlpha=pulse;
      ctx.fillStyle='#795548';ctx.fillRect(-25,-5,50,10);
      ctx.strokeStyle='#FF8F00';ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.strokeRect(-30,-30,60,60);ctx.setLineDash([]);
      ctx.font='16px Arial';ctx.textAlign='center';ctx.fillText('🪤',0,6);
      ctx.globalAlpha=1;
      ctx.fillStyle='#FF8F00';ctx.font='8px Arial';ctx.textAlign='center';
      ctx.fillText('TRAP',0,28);
    }
    ctx.restore();
  }
}

function drawMonsters(){
  for(const m of monsters){
    if(!m.alive||m.caught)continue;
    const [mx,my]=w2s(m.x,m.y);
    const bob=Math.sin(m.bob)*4;
    ctx.save();ctx.translate(mx,my+bob);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,m.r-2,m.r*0.8,5,0,0,Math.PI*2);ctx.fill();
    // Monster body
    const mg=ctx.createRadialGradient(-4,-4,2,0,0,m.r);
    mg.addColorStop(0,'#fff');mg.addColorStop(1,m.col);
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(0,0,m.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;ctx.stroke();
    // Emoji face
    ctx.font=(m.r*1.4)+'px Arial';ctx.textAlign='center';ctx.fillText(m.icon,0,m.r*0.45);
    // Scared indicator
    if(m.scared){
      ctx.fillStyle='#FFD700';ctx.font='bold 10px Arial';
      ctx.fillText('😱',0,-m.r-4);
    }
    // HP-bar style score indicator
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-18,m.r+4,36,7);
    ctx.fillStyle=m.col;ctx.fillRect(-18,m.r+4,36,7);
    ctx.fillStyle='#fff';ctx.font='7px Arial';ctx.textAlign='center';
    ctx.fillText('+'+m.pts,0,m.r+10);
    ctx.restore();
  }
}

const golemParticles=[];
const ironGolems=[];

function spawnIronGolems(){
  const spawns=[
    {x:600,  y:800,  name:'colorful',col:'#E53935',trim:'#FF8A80',pts:200,spd:0.55,r:38,hp:4},

    {x:3100, y:2100, name:'colorful',col:'#6A1B9A',trim:'#EA80FC',pts:200,spd:0.55,r:38,hp:4},
    {x:1200, y:400,  name:'colorful',col:'#E65100',trim:'#FFCC02',pts:200,spd:0.55,r:38,hp:4},
    {x:1200, y:1900, name:'rainbow', col:'#FF0000',trim:'#FFFFFF',pts:350,spd:0.65,r:42,hp:6},
    {x:2400, y:1300, name:'rainbow', col:'#FF0000',trim:'#FFFFFF',pts:350,spd:0.65,r:42,hp:6},
    {x:900,  y:2600, name:'perfume', col:'#F8BBD0',trim:'#FF80AB',pts:300,spd:0.5, r:40,hp:5},
    {x:2600, y:2600, name:'perfume', col:'#CE93D8',trim:'#FF80AB',pts:300,spd:0.5, r:40,hp:5},

  for(const s of spawns){

      alive:true, hits:0, dirTimer:120+Math.random()*200,
      bob:Math.random()*Math.PI*2, stomp:0, hue:Math.random()*360,

    pts:2000, spd:0.22, r:110, hp:25,
    x:1900, y:1550,
    vx:0.12, vy:0.08,
    alive:true, hits:0, dirTimer:400,
    bob:0, stomp:0, hue:0, aura:0,
    giant:true,
  });

function updateIronGolems(){
  const v=vehicles[activeV];
  const isMT=v.type==='monster'||v.type==='monster2';
  for(const g of ironGolems){
    if(!g.alive)continue;
    g.bob+=0.035; g.dirTimer--;
    if(g.name==='rainbow') g.hue=(g.hue+1.8)%360;
    if(g.giant){g.hue=(g.hue+0.4)%360; g.aura=(g.aura+0.04)%( Math.PI*2);}
    if(g.stomp>0) g.stomp--;
    if(g.dirTimer<=0){
      const ang=Math.random()*Math.PI*2;
      g.vx=Math.cos(ang)*g.spd; g.vy=Math.sin(ang)*g.spd;
      g.dirTimer=120+Math.random()*(g.giant?400:200);
      g.stomp=25;
    }
    g.x+=g.vx; g.y+=g.vy;
    g.x=Math.max(100,Math.min(W.w-100,g.x));
    g.y=Math.max(100,Math.min(W.h-100,g.y));
    if(g.x<=100||g.x>=W.w-100)g.vx*=-1;
    if(g.y<=100||g.y>=W.h-100)g.vy*=-1;
    // Perfume particles
    if(g.name==='perfume'&&Math.random()<0.15){
      golemParticles.push({x:g.x+(Math.random()-0.5)*g.r*2,y:g.y+(Math.random()-0.5)*g.r*2,
        vx:(Math.random()-0.5)*1.4,vy:-0.8-Math.random()*0.8,life:90,maxLife:90,
        icon:['🌸','🌺','💐','✨','💖','🌷','🌼'][Math.floor(Math.random()*7)]});
    }
    // Giant aura sparks
    if(g.giant&&Math.random()<0.25){
      const ang2=Math.random()*Math.PI*2;
      golemParticles.push({x:g.x+Math.cos(ang2)*g.r*0.9,y:g.y+Math.sin(ang2)*g.r*0.9,
        vx:Math.cos(ang2)*1.2,vy:Math.sin(ang2)*1.2-0.8,life:50,maxLife:50,
        icon:['⚡','✨','💫','🌟','🔥'][Math.floor(Math.random()*5)]});
    }
    // Rainbow sparkles
    if(g.name==='rainbow'&&Math.random()<0.1){
      golemParticles.push({x:g.x+(Math.random()-0.5)*g.r*2,y:g.y+(Math.random()-0.5)*g.r*2,
        vx:(Math.random()-0.5)*2,vy:-1-Math.random(),life:60,maxLife:60,icon:'🌈'});
    }
    // Monster truck hit
    const dx=g.x-v.x,dy=g.y-v.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const hitR=(g.giant?g.r*0.7:g.r)+50;
    if(isMT&&dist<hitR&&v.speed>4&&g.stomp===0){
      g.hits++;
      const ang3=Math.atan2(dy,dx);
      g.vx=Math.cos(ang3)*(g.giant?2:5); g.vy=Math.sin(ang3)*(g.giant?2:5);
      g.stomp=30;
      if(g.hits>=g.hp){
        g.alive=false;
        for(let p=0;p<(g.giant?14:6);p++) spawnParty(g.x+(Math.random()-0.5)*120,g.y+(Math.random()-0.5)*120);
        score+=g.pts; updateScoreUI();
        showMsg(g.giant?'🏆👑 THE GIANT IRON GOLEM IS DEFEATED!! +'+g.pts+' pts! YOU ARE LEGENDARY! 🚛💥':
          g.name==='rainbow'?'🌈💥 RAINBOW GOLEM CRUSHED! +'+g.pts+' pts! 🌟':
          g.name==='perfume'?'🌸💥 PERFUME GOLEM SMASHED! +'+g.pts+' pts! 🚛':
          '🤖💥 IRON GOLEM DESTROYED! +'+g.pts+' pts!');
        if(!g.giant){
          setTimeout(()=>{g.x=300+Math.random()*(W.w-600);g.y=300+Math.random()*(W.h-600);
            g.alive=true;g.hits=0;g.vx=(Math.random()-0.5)*g.spd;g.vy=(Math.random()-0.5)*g.spd;},10000);
        } else {
          setTimeout(()=>{g.x=1900;g.y=1550;g.alive=true;g.hits=0;g.vx=0.1;g.vy=0.08;
            showMsg('👑 THE GIANT IRON GOLEM HAS RETURNED! 😱');},60000);
        }
      } else {
        const left=g.hp-g.hits;
        showMsg(g.giant?'💪 GIANT GOLEM HIT! '+left+' more hits needed! Keep going! 🚛':
          '🚛 GOLEM HIT! '+left+' hits left!');
      }
    }
  }
  for(let i=golemParticles.length-1;i>=0;i--){
    const p=golemParticles[i];
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0)golemParticles.splice(i,1);
  }
}

function drawOneGolem(g){
  const [sx,sy]=w2s(g.x,g.y);
  const bob=g.stomp>0?Math.sin(g.stomp*0.55)*7:Math.sin(g.bob)*3;
  const sc=g.giant?3.4:1;
  ctx.save();
  ctx.translate(sx,sy+bob);
  ctx.scale(sc,sc);
  const col=g.name==='rainbow'?`hsl(${g.hue},88%,55%)`:g.col;
  const trim=g.name==='rainbow'?`hsl(${(g.hue+130)%360},90%,72%)`:g.trim;
  // Giant aura glow
  if(g.giant){
    const ag=ctx.createRadialGradient(0,0,40,0,0,160);
    ag.addColorStop(0,`hsla(${g.hue},80%,60%,0.35)`);
    ag.addColorStop(0.6,`hsla(${(g.hue+60)%360},80%,60%,0.12)`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,160,0,Math.PI*2);ctx.fill();
  }
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(0,42,30,8,0,0,Math.PI*2);ctx.fill();
  // LEGS
  ctx.fillStyle=col;
  ctx.fillRect(-17,18,14,24);ctx.fillRect(3,18,14,24);
  ctx.fillStyle=trim;ctx.fillRect(-17,18,14,5);ctx.fillRect(3,18,14,5);
  // BODY
  ctx.fillStyle=col;ctx.fillRect(-23,-12,46,32);
  // Iron plate lines
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-23,2);ctx.lineTo(23,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-23,12);ctx.lineTo(23,12);ctx.stroke();
  ctx.fillStyle=trim;ctx.fillRect(-23,-12,46,7);
  // Color patches / decorations
  if(g.name==='colorful'||g.name==='rainbow'){
    ctx.fillStyle=`rgba(255,255,255,0.22)`;
    ctx.fillRect(-13,1,9,9);ctx.fillRect(5,5,8,8);
    if(g.name==='rainbow'){
      ctx.fillStyle=`hsl(${(g.hue+60)%360},80%,60%)`;
      ctx.fillRect(-13,1,9,9);
    }
  }
  if(g.name==='perfume'){
    ctx.font='10px Arial';ctx.textAlign='center';
    ctx.fillText('🌸',-8,5);ctx.fillText('🌺',8,15);
  }
  // LEFT ARM
  ctx.save();ctx.translate(-27,-4);ctx.rotate(-0.18);
  ctx.fillStyle=col;ctx.fillRect(-11,-4,12,36);
  ctx.fillStyle=trim;ctx.fillRect(-11,30,13,10);
  ctx.restore();
  // RIGHT ARM
  ctx.save();ctx.translate(27,-4);ctx.rotate(0.18);
  ctx.fillStyle=col;ctx.fillRect(-1,-4,12,36);
  ctx.fillStyle=trim;ctx.fillRect(-1,30,13,10);
  ctx.restore();
  // HEAD
  ctx.fillStyle=col;ctx.fillRect(-18,-36,36,26);
  ctx.fillStyle=trim;ctx.fillRect(-7,-29,14,12);
  // Eyes
  const eyeC=g.giant?`hsl(${g.hue*2%360},100%,70%)`:
    g.name==='rainbow'?`hsl(${(g.hue+180)%360},100%,78%)`:
    g.name==='perfume'?'#FF4081':'#FF1744';
  ctx.fillStyle=eyeC;
  ctx.shadowColor=eyeC;ctx.shadowBlur=8;
  ctx.fillRect(-13,-32,7,6);ctx.fillRect(6,-32,7,6);
  ctx.shadowBlur=0;
  // Giant crown
  if(g.giant){
    ctx.fillStyle=`hsl(${g.hue},95%,55%)`;
    ctx.fillRect(-22,-44,44,9);
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(-20+i*10,-44);ctx.lineTo(-15+i*10,-58);ctx.lineTo(-10+i*10,-44);
      ctx.fill();
    }
    ctx.fillStyle='#FFFFFF';
    for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-16+i*10,-50,3.5,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#FFD700';ctx.font='bold 11px Arial';ctx.textAlign='center';
    ctx.shadowColor='#FF6D00';ctx.shadowBlur=10;
    ctx.fillText('👑 WORLD\'S GREATEST IRON GOLEM 👑',0,-66);
    ctx.shadowBlur=0;
  }
  // Hit flash
  if(g.stomp>18){
    ctx.fillStyle=`rgba(255,80,0,${(g.stomp-18)/12*0.45})`;
    ctx.fillRect(-28,-44,60,90);
  }
  // HP bar (after taking hits)
  if(g.hits>0){
    const pct=(g.hp-g.hits)/g.hp;
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(-26,50,52,9);
    ctx.fillStyle=pct>0.5?'#4CAF50':pct>0.25?'#FFC107':'#F44336';
    ctx.fillRect(-26,50,52*pct,9);
  }
  // Name label
  const lbl=g.giant?'':
    g.name==='rainbow'?'🌈 RAINBOW GOLEM':
    g.name==='perfume'?'🌸 PERFUME GOLEM':
    '🤖 IRON GOLEM';
  if(lbl){
    ctx.fillStyle=g.name==='rainbow'?`hsl(${g.hue},90%,65%)`:'#CFD8DC';
    ctx.font='bold 8px Arial';ctx.textAlign='center';
    ctx.fillText(lbl,0,-48);
  }
  ctx.restore();
}

function drawIronGolems(){
  // Particles behind golems
  for(const p of golemParticles){
    const[px,py]=w2s(p.x,p.y);
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.font='15px Arial';ctx.textAlign='center';
    ctx.fillText(p.icon,px,py);
  }
  ctx.globalAlpha=1;
  // Regular golems first, giant on top
  for(const g of ironGolems) if(g.alive&&!g.giant) drawOneGolem(g);
  for(const g of ironGolems) if(g.alive&&g.giant)  drawOneGolem(g);
}

function spawnFarmAnimals(){
  const counts=[4,5,3,7,4,3,4,6,2,2,3,4];
  for(let t=0;t<ANIMAL_DEFS.length;t++){
    for(let n=0;n<counts[t];n++){
      const def=ANIMAL_DEFS[t];
      FARM_ANIMALS.push({...def,
        x:FARM_CENTER.x+(Math.random()-0.5)*FARM_W*0.82,
        y:FARM_CENTER.y+(Math.random()-0.5)*FARM_H*0.82,
        vx:(Math.random()-0.5)*def.spd,vy:(Math.random()-0.5)*def.spd,
        bob:Math.random()*Math.PI*2,dirTimer:60+Math.random()*160,
        soundTimer:Math.floor(Math.random()*500),showSound:false,soundLife:0,
      });
    }
  }
}

function updateFarmAnimals(){
  const v=vehicles[activeV];
  const fx1=FARM_CENTER.x-FARM_W/2+20,fx2=FARM_CENTER.x+FARM_W/2-20;
  const fy1=FARM_CENTER.y-FARM_H/2+20,fy2=FARM_CENTER.y+FARM_H/2-20;
  for(const a of FARM_ANIMALS){
    a.bob+=0.06;a.dirTimer--;
    if(a.dirTimer<=0){
      const ang=Math.random()*Math.PI*2;
      a.vx=Math.cos(ang)*a.spd;a.vy=Math.sin(ang)*a.spd;
      a.dirTimer=60+Math.random()*160;
    }
    a.x+=a.vx;a.y+=a.vy;
    if(a.x<fx1||a.x>fx2)a.vx*=-1;
    if(a.y<fy1||a.y>fy2)a.vy*=-1;
    a.x=Math.max(fx1,Math.min(fx2,a.x));
    a.y=Math.max(fy1,Math.min(fy2,a.y));
    if(a.showSound){a.soundLife--;if(a.soundLife<=0)a.showSound=false;}
    a.soundTimer--;
    if(a.soundTimer<=0){
      a.soundTimer=300+Math.random()*600;
      a.showSound=true;a.soundLife=90;
      const pdx=a.x-v.x,pdy=a.y-v.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<220)showMsg('🌾 '+a.name+' says: '+a.sound);
    }
  }
}

function drawFarmAnimals(){
  // Farm ground tint
  const [fsx,fsy]=w2s(FARM_CENTER.x-FARM_W/2,FARM_CENTER.y-FARM_H/2);
  const [fex,fey]=w2s(FARM_CENTER.x+FARM_W/2,FARM_CENTER.y+FARM_H/2);
  const fsw=fex-fsx,fsh=fey-fsy;
  ctx.fillStyle='rgba(139,195,74,0.18)';ctx.fillRect(fsx,fsy,fsw,fsh);
  // Fence posts + rails
  ctx.strokeStyle='#795548';ctx.lineWidth=3;ctx.strokeRect(fsx,fsy,fsw,fsh);
  ctx.fillStyle='#6D4C41';
  const psx=fsw/10,psy=fsh/6;
  for(let i=0;i<=10;i++){ctx.fillRect(fsx+i*psx-2,fsy-5,4,12);ctx.fillRect(fsx+i*psx-2,fsy+fsh-4,4,12);}
  for(let i=0;i<=6;i++){ctx.fillRect(fsx-5,fsy+i*psy-2,12,4);ctx.fillRect(fsx+fsw-4,fsy+i*psy-2,12,4);}
  // Rail lines
  ctx.strokeStyle='#8D6E63';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(fsx,fsy+fsh*0.35);ctx.lineTo(fsx+fsw,fsy+fsh*0.35);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fsx,fsy+fsh*0.65);ctx.lineTo(fsx+fsw,fsy+fsh*0.65);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fsx+fsw*0.35,fsy);ctx.lineTo(fsx+fsw*0.35,fsy+fsh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fsx+fsw*0.65,fsy);ctx.lineTo(fsx+fsw*0.65,fsy+fsh);ctx.stroke();
  // Farm sign
  const [signX,signY]=w2s(FARM_CENTER.x,FARM_CENTER.y-FARM_H/2-28);
  ctx.fillStyle='#5D4037';ctx.beginPath();ctx.roundRect(signX-54,signY-14,108,24,5);ctx.fill();
  ctx.fillStyle='#FFEB3B';ctx.font='bold 11px Arial';ctx.textAlign='center';
  ctx.fillText('🌾 HAPPY FARM 🌾',signX,signY+2);
  // Animals
  for(const a of FARM_ANIMALS){
    const [ax,ay]=w2s(a.x,a.y);
    const bob=Math.sin(a.bob)*2.5;
    ctx.save();ctx.translate(ax,ay+bob);
    ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(0,a.r-1,a.r*0.76,4,0,0,Math.PI*2);ctx.fill();
    const ag=ctx.createRadialGradient(-2,-2,1,0,0,a.r);
    ag.addColorStop(0,'#fff');ag.addColorStop(1,a.col);
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,a.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font=(a.r*1.5)+'px Arial';ctx.textAlign='center';ctx.fillText(a.icon,0,a.r*0.45);
    if(a.showSound&&a.soundLife>0){
      ctx.globalAlpha=Math.min(1,a.soundLife/20);
      ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.roundRect(-22,-a.r-26,44,19,5);ctx.fill();
      ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();

// ── CANVAS BUTTONS ───────────────────────────────────────────────────────────
const CANVAS_BTNS=[
  {id:'time',  label:()=>timeOfDay==='morning'?'🌅 MORNING':timeOfDay==='afternoon'?'☀️ AFTERNOON':'🌙 NIGHT',  col:'#87CEEB', action:()=>cycleTime()},
  {id:'fire',  label:()=>'🔥 FIRE!',   col:'#FF5722', action:()=>spawnFireHere()},
  {id:'fwork', label:()=>'🎆 FIREWORK',col:'#E91E63', action:()=>launchFirework()},
];
function getBtnRect(i){
  const bw=150,bh=52,gap=12;
  const totalW=CANVAS_BTNS.length*(bw+gap)-gap;
  const startX=(canvas.width-totalW)/2;
  return{x:startX+i*(bw+gap),y:canvas.height-68,w:bw,h:bh};
}
function drawCanvasButtons(){
  if(spaceMode)return;
  for(let i=0;i<CANVAS_BTNS.length;i++){
    const b=CANVAS_BTNS[i];
    const r=getBtnRect(i);
    const pulse=0.85+0.15*Math.sin(Date.now()*0.005+i);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath();ctx.roundRect(r.x+3,r.y+3,r.w,r.h,12);ctx.fill();
    // Background
    ctx.fillStyle=`rgba(0,0,20,0.92)`;
    ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,12);ctx.fill();
    // Glowing border
    ctx.strokeStyle=b.col;ctx.lineWidth=3;ctx.globalAlpha=pulse;
    ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,12);ctx.stroke();
    ctx.globalAlpha=1;
    // Label
    ctx.fillStyle=b.col;ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText(b.label(),r.x+r.w/2,r.y+r.h/2+6);
  }
}
function handleCanvasClick(e){
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX||e.touches[0].clientX)-rect.left;
  const cy=(e.clientY||e.touches[0].clientY)-rect.top;
  for(let i=0;i<CANVAS_BTNS.length;i++){
    const r=getBtnRect(i);
    if(cx>=r.x&&cx<=r.x+r.w&&cy>=r.y&&cy<=r.y+r.h){
      CANVAS_BTNS[i].action();
      return;
    }
  }
}
canvas.addEventListener('mousedown',handleCanvasClick);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleCanvasClick(e);},{passive:false});

const TIME_STATES=['morning','afternoon','night'];
let timeOfDay='afternoon';
function cycleTime(){

function drawTimeOverlay(){
  if(spaceMode)return;
  if(timeOfDay==='morning'){
    ctx.fillStyle='rgba(255,140,30,0.22)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // Sun rising bottom-left
    const [sunX,sunY]=[-50+canvas.width*0.12, canvas.height*0.82];
    const sg=ctx.createRadialGradient(sunX,sunY,10,sunX,sunY,140);
    sg.addColorStop(0,'rgba(255,220,80,0.55)');sg.addColorStop(1,'rgba(255,140,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,140,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,50,0.9)';ctx.beginPath();ctx.arc(sunX,sunY,28,0,Math.PI*2);ctx.fill();
    // Stars fading
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px Arial';
    for(let i=0;i<20;i++){const sx=(i*317)%canvas.width,sy=(i*97)%180;ctx.fillText('✦',sx,sy);}
  } else if(timeOfDay==='night'){
    ctx.fillStyle='rgba(0,5,40,0.72)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // Stars
    const t=Date.now()*0.001;
    for(let i=0;i<80;i++){
      const sx=(i*317+Math.sin(i)*40)%canvas.width, sy=(i*97)%240;
      const al=0.4+0.6*Math.sin(t*1.8+i*0.7);
      ctx.globalAlpha=al;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(sx,sy,i%5===0?2:1,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // Moon in sky
    ctx.fillStyle='rgba(255,255,230,0.95)';ctx.beginPath();ctx.arc(canvas.width*0.85,70,38,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(200,200,180,0.5)';ctx.beginPath();ctx.arc(canvas.width*0.85+12,62,18,0,Math.PI*2);ctx.fill();
    // Street light glows
    ctx.fillStyle='rgba(255,230,100,0.08)';
    for(let i=0;i<6;i++){
      const lx=canvas.width*((i+0.5)/6), ly=canvas.height*0.5;
      ctx.beginPath();ctx.arc(lx,ly,120,0,Math.PI*2);ctx.fill();
    }
  }
}

// ── FIREWORKS ────────────────────────────────────────────────────────────────
const fireworks=[];
const fwParticles=[];
function launchFirework(){
  const v=vehicles[activeV];
  fireworks.push({
    x:v.x+(Math.random()-0.5)*200, y:v.y,
    vy:-(12+Math.random()*6),
    targetY:v.y-(400+Math.random()*300),
    col:`hsl(${Math.random()*360},100%,60%)`,
    burst:false
  });
  score+=10;updateScoreUI();
}
function spawnFireHere(){
  const v=vehicles[activeV];
  fires.push({x:v.x+(Math.random()-0.5)*80,y:v.y+(Math.random()-0.5)*80,size:8+Math.random()*12,life:400+Math.random()*200});
  showMsg('🔥 Fire started! Drive the Fire Truck (8) to put it out!');
}
function updateFireworks(){
  for(let i=fireworks.length-1;i>=0;i--){
    const fw=fireworks[i];
    fw.y+=fw.vy;fw.vy*=0.97;
    if(!fw.burst&&fw.y<=fw.targetY){
      fw.burst=true;
      for(let p=0;p<55;p++){
        const a=Math.random()*Math.PI*2, s=3+Math.random()*7;
        fwParticles.push({x:fw.x,y:fw.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
          life:60+Math.random()*40,maxLife:90,r:4+Math.random()*4,
          col:`hsl(${Math.random()*360},100%,65%)`});
      }
      fireworks.splice(i,1);
    }
  }
  for(let i=fwParticles.length-1;i>=0;i--){
    const p=fwParticles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.97;p.vy*=0.97;p.life--;p.r*=0.98;
    if(p.life<=0)fwParticles.splice(i,1);
  }
}
function drawFireworks(){
  // Rising rockets
  for(const fw of fireworks){
    const [fx,fy]=w2s(fw.x,fw.y);
    if(fx<-20||fx>canvas.width+20||fy<-20||fy>canvas.height+20)continue;
    ctx.fillStyle=fw.col;ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=fw.col;ctx.lineWidth=2;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy+20);ctx.stroke();ctx.globalAlpha=1;
  }
  // Burst particles
  for(const p of fwParticles){
    const [px,py]=w2s(p.x,p.y);
    ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── FIBER DISPENSERS ─────────────────────────────────────────────────────────
const FIBER_DISPENSERS=[
  {x:600,y:400},{x:2400,y:400},{x:300,y:2200},{x:3100,y:2200},{x:1700,y:700},{x:1700,y:2400}
];
const fiberTrails=[];// trail segments left behind
function updateFiberDispensers(){
  const v=vehicles[activeV];
  for(const fd of FIBER_DISPENSERS){
    const dx=v.x-fd.x, dy=v.y-fd.y;
    if(Math.sqrt(dx*dx+dy*dy)<100){
      addInv('fiber',1);
      fiberTrails.push({x:fd.x+(Math.random()-0.5)*60,y:fd.y+(Math.random()-0.5)*60,
        tx:v.x,ty:v.y,life:180,maxLife:180,
        col:['#E91E63','#9C27B0','#3F51B5','#00BCD4'][Math.floor(Math.random()*4)]});
      score+=2;updateScoreUI();
    }
  }
  for(let i=fiberTrails.length-1;i>=0;i--){fiberTrails[i].life--;if(fiberTrails[i].life<=0)fiberTrails.splice(i,1);}
}
function drawFiberDispensers(){
  const t=Date.now()*0.003;
  for(const fd of FIBER_DISPENSERS){
    const [fx,fy]=w2s(fd.x,fd.y);
    // Machine body
    ctx.fillStyle='#5C6BC0';ctx.fillRect(fx-18,fy-22,36,44);
    ctx.strokeStyle='#9FA8DA';ctx.lineWidth=2;ctx.strokeRect(fx-18,fy-22,36,44);
    // Spinning spool
    const spin=t*2;
    ctx.save();ctx.translate(fx,fy-4);ctx.rotate(spin);
    ctx.strokeStyle='#E91E63';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(10,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,10);ctx.stroke();
    ctx.restore();
    // Fiber strands shooting out
    for(let s=0;s<4;s++){
      const sa=s/4*Math.PI*2+t;
      ctx.strokeStyle=`hsl(${(t*60+s*90)%360},100%,60%)`;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.moveTo(fx,fy-4);
      ctx.lineTo(fx+Math.cos(sa)*30,fy-4+Math.sin(sa)*30);ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#E91E63';ctx.font='bold 9px Arial';ctx.textAlign='center';
    ctx.fillText('🧵 FIBER',fx,fy+28);
  }
  // Draw fiber trails
  for(const tr of fiberTrails){
    const [sx,sy]=w2s(tr.x,tr.y);
    const [tx2,ty2]=w2s(tr.tx,tr.ty);
    const al=tr.life/tr.maxLife;
    ctx.globalAlpha=al*0.6;ctx.strokeStyle=tr.col;ctx.lineWidth=2;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(tx2,ty2);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }
}

const snails=[], snakes=[], worms=[];

function spawnCritters(){

  const snakePos=[{x:700,y:800},{x:2500,y:700},{x:900,y:2100},{x:2700,y:2100}];

    for(let i=0;i<8;i++) segs.push({x:p.x-i*8,y:p.y});
    snakes.push({segs,angle:Math.random()*Math.PI*2,speed:0.8+Math.random()*0.5,
      dirTimer:120+Math.random()*200,col:`hsl(${100+Math.random()*60},70%,35%)`});
  }
  // Worms — appear from holes, wiggle, burrow back
  const wormPos=[{x:550,y:1100},{x:1300,y:600},{x:2000,y:1300},{x:2600,y:1700},{x:1100,y:2300},{x:3000,y:800}];
  for(const p of wormPos){
    worms.push({x:p.x,y:p.y,phase:Math.random()*Math.PI*2,surface:0,surfaceDir:1,
      timer:Math.random()*300,segs:Array.from({length:6},(_,i)=>({x:p.x,y:p.y+i*6}))});
  }
}

function updateCritters(){
  // Snails
  for(const s of snails){
    s.bob+=0.04;s.dirTimer--;s.trailTimer++;
    if(s.dirTimer<=0){s.angle+=( Math.random()-0.5)*1.2;s.dirTimer=200+Math.random()*300;}
    s.x+=Math.cos(s.angle)*s.speed;s.y+=Math.sin(s.angle)*s.speed;
    s.x=Math.max(50,Math.min(W.w-50,s.x));s.y=Math.max(50,Math.min(W.h-50,s.y));
    if(s.x<=50||s.x>=W.w-50)s.angle=Math.PI-s.angle;
    if(s.y<=50||s.y>=W.h-50)s.angle=-s.angle;
    // Slime trail
    if(s.trailTimer%15===0)snailTrails.push({x:s.x,y:s.y,life:600,maxLife:600});
    s.shell+=0.01;
  }
  for(let i=snailTrails.length-1;i>=0;i--){snailTrails[i].life--;if(snailTrails[i].life<=0)snailTrails.splice(i,1);}

  // Snakes
  for(const sn of snakes){
    sn.dirTimer--;
    if(sn.dirTimer<=0){sn.angle+=(Math.random()-0.5)*0.9;sn.dirTimer=120+Math.random()*200;}
    const head=sn.segs[0];
    const nx=Math.max(50,Math.min(W.w-50,head.x+Math.cos(sn.angle)*sn.speed));
    const ny=Math.max(50,Math.min(W.h-50,head.y+Math.sin(sn.angle)*sn.speed));
    if(nx===50||nx===W.w-50)sn.angle=Math.PI-sn.angle;
    if(ny===50||ny===W.h-50)sn.angle=-sn.angle;
    // Shift segments
    for(let i=sn.segs.length-1;i>0;i--){sn.segs[i].x=sn.segs[i-1].x;sn.segs[i].y=sn.segs[i-1].y;}
    sn.segs[0].x=nx;sn.segs[0].y=ny;
  }

  // Worms
  for(const w of worms){
    w.timer--;w.phase+=0.08;
    if(w.timer<=0){w.surfaceDir*=-1;w.timer=150+Math.random()*200;}
    w.surface=Math.max(0,Math.min(1,w.surface+w.surfaceDir*0.01));
    // Wiggle segs
    for(let i=0;i<w.segs.length;i++){
      w.segs[i].x=w.x+Math.sin(w.phase+i*0.7)*6;
      w.segs[i].y=w.y+i*7*(w.surface);
    }
  }
}

function drawCritters(){
  // Slime trails
  for(const tr of snailTrails){
    const [tx,ty]=w2s(tr.x,tr.y);
    ctx.globalAlpha=(tr.life/tr.maxLife)*0.45;
    ctx.fillStyle='#AED581';ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Snails 🐌
  for(const s of snails){
    const [sx,sy]=w2s(s.x,s.y);
    ctx.save();ctx.translate(sx,sy+Math.sin(s.bob)*2);
    // Body
    ctx.fillStyle='#F9A825';
    ctx.beginPath();ctx.ellipse(0,3,14,7,s.angle,0,Math.PI*2);ctx.fill();
    // Shell (spiral)
    ctx.save();ctx.translate(0,-2);ctx.rotate(s.shell);
    ctx.fillStyle='#8D6E63';ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#5D4037';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*1.5);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI);ctx.stroke();
    ctx.restore();
    // Eyes on stalks
    ctx.strokeStyle='#F9A825';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-5,-2);ctx.lineTo(-7,-9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-1,-3);ctx.lineTo(1,-10);ctx.stroke();
    ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(-7,-9,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(1,-10,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Snakes 🐍
  for(const sn of snakes){
    if(sn.segs.length<2)continue;
    // Body
    ctx.strokeStyle=sn.col;ctx.lineWidth=8;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    const [h0x,h0y]=w2s(sn.segs[0].x,sn.segs[0].y);ctx.moveTo(h0x,h0y);
    for(let i=1;i<sn.segs.length;i++){const [bx,by]=w2s(sn.segs[i].x,sn.segs[i].y);ctx.lineTo(bx,by);}
    ctx.stroke();
    // Scale pattern
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(h0x,h0y);
    for(let i=1;i<sn.segs.length;i++){const [bx,by]=w2s(sn.segs[i].x,sn.segs[i].y);ctx.lineTo(bx,by);}
    ctx.stroke();
    // Head
    ctx.fillStyle=sn.col;ctx.beginPath();ctx.arc(h0x,h0y,7,0,Math.PI*2);ctx.fill();
    // Eyes
    const ea=sn.segs.length>1?Math.atan2(sn.segs[0].y-sn.segs[1].y,sn.segs[0].x-sn.segs[1].x):0;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(h0x+Math.cos(ea-0.5)*5,h0y+Math.sin(ea-0.5)*5,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(h0x+Math.cos(ea+0.5)*5,h0y+Math.sin(ea+0.5)*5,2.5,0,Math.PI*2);ctx.fill();
    // Tongue flick
    if(Math.sin(Date.now()*0.01)>0.5){
      ctx.strokeStyle='#F44336';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(h0x+Math.cos(ea)*8,h0y+Math.sin(ea)*8);
      ctx.lineTo(h0x+Math.cos(ea)*14+Math.cos(ea+0.5)*4,h0y+Math.sin(ea)*14+Math.sin(ea+0.5)*4);
      ctx.moveTo(h0x+Math.cos(ea)*8,h0y+Math.sin(ea)*8);
      ctx.lineTo(h0x+Math.cos(ea)*14+Math.cos(ea-0.5)*4,h0y+Math.sin(ea)*14+Math.sin(ea-0.5)*4);
      ctx.stroke();
    }
  }

  // Worms 🪱
  for(const w of worms){
    if(w.surface<0.05)continue;
    for(let i=w.segs.length-1;i>=0;i--){
      const [wx2,wy2]=w2s(w.segs[i].x,w.segs[i].y);
      const t=(w.segs.length-i)/w.segs.length;
      ctx.fillStyle=i===0?'#E57373':`rgb(${180+i*5},${100-i*8},${80-i*5})`;
      ctx.beginPath();ctx.arc(wx2,wy2,(6-i*0.5)*w.surface,0,Math.PI*2);ctx.fill();
      if(i===0){// head ring
        ctx.strokeStyle='#B71C1C';ctx.lineWidth=1;ctx.stroke();
        ctx.fillStyle='#212121';
        ctx.beginPath();ctx.arc(wx2+2,wy2-2,1.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(wx2-2,wy2-2,1.5,0,Math.PI*2);ctx.fill();
      }
    }
  }
}
